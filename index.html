        "ref": "vv. 11&ndash;13",
        "quote": "&ldquo;In whom we have boldness and access with confidence through our faith in him. So I ask you not to lose heart over what I am suffering for you, which is your glory.&rdquo;",
        "commentary": "<p>&ldquo;Boldness and access with confidence&rdquo; &mdash; <em>parresia</em> is the right to speak freely before a superior, the freedom of a citizen before his king, or a child before his father. Through Christ, believers approach God not as terrified suppliants but as those who know they are welcomed.</p><p>Paul&rsquo;s suffering is not evidence that the plan is failing; it is the means by which the plan advances, which is why it is &ldquo;your glory.&rdquo; The imprisoned apostle is not an argument against the gospel; he is one of its most powerful demonstrations.</p>"
      }
    ],
    "examples": "<p><strong>Then:</strong> The idea that Gentiles could be not merely tolerated but equal co-heirs with Israel was revolutionary enough to cost Paul his life. It was the charge that brought him to Rome. Jewish Christianity had to absorb the theological shock that their covenant privileges were not diminished by Gentile inclusion but expanded into a new and larger entity. The mystery was not obvious; it required revelation to see it.</p><p><strong>Now:</strong> The church exists to make visible the manifold wisdom of God to the watching cosmos. When churches are tribal, suspicious, or homogeneous by preference, they are obscuring the very thing the powers and authorities in the heavenlies are watching for. The diversity of the church is not a social nicety &mdash; it is a cosmic advertisement for the wisdom of God.</p>",
    "text": "<sup>1</sup>For this reason I, Paul, a prisoner of Christ Jesus on behalf of you Gentiles &mdash; <sup>2</sup>assuming that you have heard of the stewardship of God&rsquo;s grace that was given to me for you, <sup>3</sup>how the mystery was made known to me by revelation, as I have written briefly. <sup>4</sup>When you read this, you can perceive my insight into the mystery of Christ, <sup>5</sup>which was not made known to the sons of men in other generations as it has now been revealed to his holy apostles and prophets by the Spirit. <sup>6</sup>This mystery is that the Gentiles are fellow heirs, members of the same body, and partakers of the promise in Christ Jesus through the gospel. <sup>7</sup>Of this gospel I was made a minister according to the gift of God&rsquo;s grace, which was given me by the working of his power. <sup>8</sup>To me, though I am the very least of all the saints, this grace was given, to preach to the Gentiles the unsearchable riches of Christ, <sup>9</sup>and to bring to light for everyone what is the plan of the mystery hidden for ages in God, who created all things, <sup>10</sup>so that through the church the manifold wisdom of God might now be made known to the rulers and authorities in the heavenly places. <sup>11</sup>This was according to the eternal purpose that he has realized in Christ Jesus our Lord, <sup>12</sup>in whom we have boldness and access with confidence through our faith in him. <sup>13</sup>So I ask you not to lose heart over what I am suffering for you, which is your glory."
  },
  "7": {
    "ref": "3:14&ndash;21",
    "title": "Paul&rsquo;s Second Prayer",
    "overview": "<p>Now Paul completes the prayer he broke off in 3:1. He bows his knees &mdash; an unusual posture for Jewish prayer, which was typically standing &mdash; and the posture signals what the prayer contains: conscious submission before the Father from whom every family in heaven and on earth is named. The one to whom he prays is not one deity among many but the original from which all fatherhood derives its meaning and its name.</p><p>What he asks is, by any measure, the most ambitious prayer in the New Testament. He asks that the Ephesians would be strengthened in the inner man. That Christ would dwell &mdash; take up permanent residence &mdash; in their hearts. That they would comprehend the full dimensions of Christ&rsquo;s love: breadth and length and height and depth. That they would know a love that surpasses knowledge. And then &mdash; that they would be filled to all the fullness of God. Filled to all the fullness of God. The man writing this is in prison awaiting trial, and he is praying the largest prayer in Scripture for people he may never see again. He prays large because he is praying to someone larger still: the one who is able to do far more abundantly than all we ask or think.</p>",
    "verseByVerse": [
      {
        "ref": "vv. 14&ndash;15",
        "quote": "&ldquo;For this reason I bow my knees before the Father, from whom every family in heaven and on earth is named.&rdquo;",
        "commentary": "<p>Bowing the knees signifies urgency and submission &mdash; this is not routine intercession but prostrated, pressing prayer. &ldquo;Every family&rdquo; (<em>pasa patria</em>) &mdash; there is a Greek wordplay: Father (<em>pat&ecirc;r</em>) / family (<em>patria</em>). Every family in creation derives its identity, existence, and name from the original Father. Human fatherhood is a creaturely reflection of the divine original; it points beyond itself to the one from whom it borrows its meaning.</p>"
      },
      {
        "ref": "v. 16",
        "quote": "&ldquo;That according to the riches of his glory he may grant you to be strengthened with power through his Spirit in your inner being.&rdquo;",
        "commentary": "<p>Not &ldquo;out of&rdquo; but &ldquo;according to&rdquo; the riches of his glory &mdash; the giving is proportioned to the wealth of God himself, not merely drawn from it as from a finite account. The strengthening is in the &ldquo;inner being&rdquo; (<em>eso anthr&omacr;pon</em>) &mdash; the centre of the person. This is where the work of God happens first. External circumstances change last, if at all; the inner person is transformed first.</p>"
      },
      {
        "ref": "v. 17",
        "quote": "&ldquo;So that Christ may dwell in your hearts through faith, that you, being rooted and grounded in love.&rdquo;",
        "commentary": "<p>&ldquo;Dwell&rdquo; (<em>katoike&omacr;</em>) as opposed to <em>paroike&omacr;</em> (sojourn temporarily). The word means to take up permanent residence, to be fully at home. The prayer is not that Christ would visit occasionally but that he would inhabit permanently &mdash; not on the periphery of the life but at its centre. &ldquo;Through faith&rdquo; &mdash; faith is the channel and the continuing posture that keeps the centre available to him.</p><p>&ldquo;Rooted&rdquo; (agricultural) and &ldquo;grounded&rdquo; (architectural) &mdash; two metaphors for stability in love. The love is the soil and the foundation. The comprehension Paul prays for in v.&nbsp;18 requires this stability first.</p>"
      },
      {
        "ref": "vv. 18&ndash;19",
        "quote": "&ldquo;May have strength to comprehend with all the saints what is the breadth and length and height and depth, and to know the love of Christ that surpasses knowledge, that you may be filled with all the fullness of God.&rdquo;",
        "commentary": "<p>The comprehension Paul prays for is corporate: &ldquo;with all the saints.&rdquo; The dimensions of Christ&rsquo;s love &mdash; breadth, length, height, depth &mdash; are greater than any single believer or any single culture can contain. The whole church together is required to begin to approximate them. This is one reason why theological isolation &mdash; the Christian who reads only one tradition, associates only with one kind of believer &mdash; is spiritually diminishing.</p><p>&ldquo;To know the love of Christ that surpasses knowledge&rdquo; &mdash; not contradiction but transcendence: experiential knowledge of what theoretical knowledge cannot contain. And then the petition&rsquo;s summit: &ldquo;filled with all the fullness of God.&rdquo; Not filled with some of God&rsquo;s goodness, not filled with spiritual blessings &mdash; filled with all the fullness of God. This prayer will never be fully answered this side of glory. That is not a reason to pray it less; it is the reason to never stop.</p>"
      },
      {
        "ref": "vv. 20&ndash;21",
        "quote": "&ldquo;Now to him who is able to do far more abundantly than all that we ask or think, according to the power at work within us, to him be glory in the church and in Christ Jesus throughout all generations, forever and ever.&rdquo;",
        "commentary": "<p>&ldquo;Far more abundantly&rdquo; (<em>huperekperissou</em>) &mdash; beyond all measure, above and over and past everything. The God to whom Paul has been praying is not constrained by the size of the prayer. His ability exceeds what we can ask AND what we can think &mdash; both the spoken petition and the unarticulated imagination fall short of what he is able to do.</p><p>&ldquo;According to the power at work within us&rdquo; &mdash; the power is not a distant resource to be accessed but an active, present force already operating within the believer. The doxology is directed to God &ldquo;in the church and in Christ Jesus&rdquo; &mdash; both together, indissolubly, as the location where God&rsquo;s glory is displayed on earth.</p>"
      }
    ],
    "theology": "<p><strong>The Indwelling of Christ and Trinitarian Sanctification.</strong> Verse 17 &mdash; &ldquo;that Christ may dwell in your hearts through faith&rdquo; &mdash; combined with the Spirit&rsquo;s strengthening in v.&nbsp;16, describes the Trinitarian pattern of divine presence in the believer. The Spirit strengthens the inner person; Christ takes up residence at the centre. This is not pantheism but intimate personal presence &mdash; God genuinely residing within, not dissolved into, the believer. The Reformed tradition has insisted that this indwelling is real, not merely metaphorical, and that it is the source of all genuine sanctification: the change does not come from trying harder but from the one who dwells within making his home in ever deeper regions of the life.</p>",
    "examples": "<p><strong>Then:</strong> Paul prays this prayer from prison. The man asking God to do &ldquo;far more abundantly than all we ask or think&rdquo; is in chains, awaiting trial, uncertain of the outcome. The doxology at the end &mdash; &ldquo;to him be glory in the church throughout all generations, forever and ever&rdquo; &mdash; is not triumphalism. It is the defiance of a man who knows that Caesar&rsquo;s chains cannot confine the God who fills all in all.</p><p><strong>Now:</strong> The prayer is a rebuke to small praying. Most congregational intercession circles around the immediate and the medical &mdash; both legitimate. Paul prays for inner strengthening, the comprehension of Christ&rsquo;s love, the fullness of God. The question the preacher should leave the congregation with: how much of your prayer life is oriented toward knowing God more fully, and how much toward managing the externals?</p>",
    "text": "<sup>14</sup>For this reason I bow my knees before the Father, <sup>15</sup>from whom every family in heaven and on earth is named, <sup>16</sup>that according to the riches of his glory he may grant you to be strengthened with power through his Spirit in your inner being, <sup>17</sup>so that Christ may dwell in your hearts through faith &mdash; that you, being rooted and grounded in love, <sup>18</sup>may have strength to comprehend with all the saints what is the breadth and length and height and depth, <sup>19</sup>and to know the love of Christ that surpasses knowledge, that you may be filled with all the fullness of God. <sup>20</sup>Now to him who is able to do far more abundantly than all that we ask or think, according to the power at work within us, <sup>21</sup>to him be glory in the church and in Christ Jesus throughout all generations, forever and ever. Amen."
  },
  "8": {
    "ref": "4:1&ndash;6",
    "title": "The Unity of the Spirit",
    "overview": "<p>&ldquo;Therefore.&rdquo; The hinge on which the whole letter turns. Three chapters of the most breathtaking theology in the New Testament &mdash; election before the foundation of the world, resurrection from spiritual death, the wall demolished at Calvary, the mystery hidden for ages now disclosed, the love whose dimensions require the whole church to comprehend &mdash; and now: <em>therefore, walk worthy of it</em>. The theology produces the ethics. The indicative generates the imperative. Paul does not ask the Ephesians to manufacture unity; he asks them to maintain what already exists.</p><p>The unity is given, not achieved. It is the gift of the Spirit who has made one body, one faith, one Lord, one God. What is called for is the character that keeps this unity visible in a fallen world &mdash; humility, gentleness, patience, bearing with one another in love. And then a word that stops us: <em>eager</em>. The word means to make every effort, to be zealous. Unity is a gift, but maintaining it costs everything we have. The treasure is given freely; the guarding of it is the work of a lifetime.</p>",
    "verseByVerse": [
      {
        "ref": "v. 1",
        "quote": "&ldquo;I therefore, a prisoner for the Lord, urge you to walk in a manner worthy of the calling to which you have been called.&rdquo;",
        "commentary": "<p>&ldquo;A prisoner for the Lord&rdquo; &mdash; Paul&rsquo;s authority to urge is grounded in his suffering for the gospel. He is not a comfortable advisor; he is a man in chains for what he is about to ask of them. The moral weight of the appeal is proportional to the cost the appellant has paid.</p><p>&ldquo;Walk worthy&rdquo; &mdash; <em>axios</em> literally means &ldquo;of equal weight,&rdquo; like the two pans of a balance scale. The life should be the equal-weight expression of the calling. The calling has been described in chapters 1&ndash;3; everything in chapters 4&ndash;6 is the equal-weight life. The gap between the calling and the walk is the space in which sanctification happens.</p>"
      },
      {
        "ref": "v. 2",
        "quote": "&ldquo;With all humility and gentleness, with patience, bearing with one another in love.&rdquo;",
        "commentary": "<p>Four qualities that progress. Humility (<em>tapeinophrosun&ecirc;</em>) was not a virtue in the Greco-Roman world &mdash; it described the servile posture of a slave. Paul redefines it as the foundational Christian character; Jesus modelled it at the washing of feet and on the cross. Gentleness (<em>praut&ecirc;s</em>) is not weakness but controlled strength &mdash; power that has chosen to restrain itself for the sake of another.</p><p>Patience (<em>makrothumia</em>) is long-suffering toward people, not just circumstances. &ldquo;Bearing with one another&rdquo; &mdash; the word means to put up with, to hold the weight of another&rsquo;s difficulty. Love is what makes the others sustainable: without it, humility becomes self-abasement, gentleness becomes passivity, and patience becomes resentment.</p>"
      },
      {
        "ref": "v. 3",
        "quote": "&ldquo;Eager to maintain the unity of the Spirit in the bond of peace.&rdquo;",
        "commentary": "<p>&ldquo;Maintain&rdquo; (<em>t&ecirc;rein</em>) &mdash; not create or achieve but guard and preserve. The unity already exists (vv.&nbsp;4&ndash;6 will describe it); the calling is to not break it. &ldquo;The bond of peace&rdquo; &mdash; peace is the ligament that ties the members together; there is no visible unity without peace between persons.</p><p>&ldquo;Eager&rdquo; (<em>spoudazontes</em>) means urgent effort, zealous application. Unity is a gift of the Spirit, but maintaining it in a fallen world &mdash; among people who disagree, hurt each other, have different preferences, carry different wounds &mdash; requires everything we have.</p>"
      },
      {
        "ref": "vv. 4&ndash;6",
        "quote": "&ldquo;There is one body and one Spirit&hellip; one Lord, one faith, one baptism, one God and Father of all, who is above all and through all and in all.&rdquo;",
        "commentary": "<p>Seven &ldquo;ones.&rdquo; The Trinitarian structure is visible: one Spirit (v.&nbsp;4), one Lord/Christ (v.&nbsp;5), one God and Father (v.&nbsp;6). The unity of the church is grounded in and reflects the unity of the Trinity. Divided churches are a theological contradiction of the one God they confess &mdash; not merely a practical problem but a doctrinal inconsistency.</p><p>&ldquo;Above all and through all and in all&rdquo; &mdash; the Father&rsquo;s pervasive sovereignty is the ground of every other unity: transcendent (above), pervasive (through), immanent (in). Nothing exists outside the scope of the one God, which means there is no legitimate ground anywhere for the divisions that fracture his church.</p>"
      }
    ],
    "examples": "<p><strong>Then:</strong> The early church contained Jews who had kept Torah for generations alongside Gentiles with no such history, slaves alongside free, men and women of every social status. The practical pressure on unity was enormous. Paul&rsquo;s appeal to seven theological &ldquo;ones&rdquo; is not abstract &mdash; it is the only foundation strong enough to hold such diversity together. No amount of shared culture or natural affinity would have sufficed.</p><p><strong>Now:</strong> Church splits are most commonly over secondary or tertiary matters &mdash; style, preference, personality, governance. Paul&rsquo;s seven ones do not include these. The unity he calls for is not the absence of diversity but the refusal to let difference become division when the seven essentials are held in common. The eagerness he calls for is a direct rebuke to the ease with which churches fracture &mdash; and to the casual way such fractures are rationalised as principled rather than named as failure.</p>",
    "text": "<sup>1</sup>I therefore, a prisoner for the Lord, urge you to walk in a manner worthy of the calling to which you have been called, <sup>2</sup>with all humility and gentleness, with patience, bearing with one another in love, <sup>3</sup>eager to maintain the unity of the Spirit in the bond of peace. <sup>4</sup>There is one body and one Spirit &mdash; just as you were called to the one hope that belongs to your call &mdash; <sup>5</sup>one Lord, one faith, one baptism, <sup>6</sup>one God and Father of all, who is over all and through all and in all."
  },
  "9": {
    "ref": "4:7&ndash;16",
    "title": "Gifts for Building the Body",
    "overview": "<p>The same Lord who descended in humiliation and ascended in triumph now lavishes gifts upon his church. This is not a tidy organisational chart; it is a portrait of sovereign generosity. The risen Christ, having conquered sin and death and led captivity itself captive, distributes grace-gifts to every single member of his body &mdash; not for personal decoration but for a common, glorious purpose: the building up of the body until it reaches the full stature of Christ himself.</p><p>Paul unfolds a stunning logic. The ascended Christ gave apostles, prophets, evangelists, pastors and teachers not to do all the ministry themselves but to equip the saints to do the work. The saints do the building. The church grows as every part works. The result is a body that is no longer tossed by every theological wind, no longer deceived by cunning teachers, but speaking truth in love and growing up into its head, who is Christ. This passage is one of the most magnificent descriptions of the church in all of Scripture &mdash; not as an institution but as a living organism, held together by Christ and energised by his Spirit.</p>",
    "verseByVerse": [
      {
        "ref": "v. 7",
        "quote": "&ldquo;But grace was given to each one of us according to the measure of Christ&rsquo;s gift.&rdquo;",
        "commentary": "<p>The &ldquo;but&rdquo; is a pivot from the corporate unity of verses 1&ndash;6 to individual gifting. Diversity within unity. <em>Hekast&#333;</em> &mdash; to each one, without exception. No member of the body is ungifted. The measure is determined by Christ; he gives as he sovereignly wills. This is not earned, not developed from natural talent alone, but graciously bestowed by the ascended Lord.<div class='vnote'><strong>PREACHER&rsquo;S NOTE</strong> The congregation may not feel gifted. This verse insists every believer has received grace for ministry. The question is not &ldquo;do I have a gift?&rdquo; but &ldquo;am I using what Christ has given me?&rdquo;</div></p>"
      },
      {
        "ref": "vv. 8&ndash;10",
        "quote": "&ldquo;When he ascended on high he led a host of captives, and he gave gifts to men.&rdquo;",
        "commentary": "<p>Paul quotes Psalm 68:18 &mdash; a psalm of divine warrior triumph &mdash; and applies it to Christ. In the original, the conqueror ascends and <em>receives</em> tribute. Paul renders it as <em>giving</em> gifts, likely drawing on a targum tradition where God distributes to men. The point: Christ is the conquering king. He descended (incarnation, death, the grave) and ascended (resurrection, exaltation) &mdash; and the spoils of his victory are now distributed to his people. The gifts of the Spirit are the plunder of Christ&rsquo;s conquest of sin and death.</p><p>The parenthesis about descending and ascending may also be affirming the full sweep of the incarnation &mdash; he who is now exalted is the same one who truly entered our humanity and our grave. His gifts flow from his complete redemptive work.</p>"
      },
      {
        "ref": "v. 11",
        "quote": "&ldquo;And he gave the apostles, the prophets, the evangelists, the shepherds and teachers.&rdquo;",
        "commentary": "<p>These are not spiritual gifts as such &mdash; they are gifted persons given to the church. Christ gives people as gifts. Notice: apostles and prophets are listed first (cf. 2:20 &mdash; the foundation), then the continuing offices of evangelist and pastor-teacher. The Greek construction suggests &ldquo;shepherds and teachers&rdquo; may be a single office &mdash; the pastor who teaches.<div class='vnote'><strong>PREACHER&rsquo;S NOTE</strong> Sproul and MacArthur both note that the foundational offices of apostle and prophet were tied to the completion of the canon; the continuing offices are evangelist and pastor-teacher. The church is still built today by those who preach the word.</div></p>"
      },
      {
        "ref": "v. 12",
        "quote": "&ldquo;&hellip;to equip the saints for the work of ministry, for building up the body of Christ.&rdquo;",
        "commentary": "<p>One of the most transformative verses in ecclesiology. The purpose of the gifted leaders is not to do the ministry for the saints but to <em>equip</em> (<em>katartismon</em> &mdash; the word used for mending nets, setting bones: fitting something for its proper function) the saints so that <em>they</em> do the work of ministry. The building up of the body is the saints&rsquo; work, under Word-shaped leadership.</p><p>The practical implication is staggering: a healthy church is not one where a gifted minister does everything, but one where the whole body is equipped and active. Pastoral ministry is not performance; it is preparation.</p>"
      },
      {
        "ref": "vv. 13&ndash;14",
        "quote": "&ldquo;&hellip;until we all attain to the unity of the faith and of the knowledge of the Son of God, to mature manhood&hellip;&rdquo;",
        "commentary": "<p>The goal is eschatological as well as present: maturity is a direction of travel. <em>T&#275;likia</em> &mdash; the full stature, the complete measure of Christ. The contrast in verse 14 is between children tossed at sea and mature adults standing firm. False teaching is the wind; doctrinal depth is the anchor. The solution to theological instability is not suspicion but growth &mdash; growing up into Christ through the ministry of the Word.<div class='vnote'><strong>PREACHER&rsquo;S NOTE</strong> &ldquo;Cunning&rdquo; in v. 14 translates <em>panourgia</em> &mdash; craftiness, the word used of the serpent in Genesis. Doctrinal deception has always employed theological-sounding language. The antidote is always the same: deep knowledge of the Son of God.</div></p>"
      },
      {
        "ref": "vv. 15&ndash;16",
        "quote": "&ldquo;&hellip;speaking the truth in love, we are to grow up in every way into him who is the head, into Christ.&rdquo;",
        "commentary": "<p><em>Al&#275;theuontes en agap&#275;</em> &mdash; truthing in love. Not just speaking truth but living it, embodying it, in a context of love. Truth without love is cold; love without truth is hollow. The maturing church holds both together as it grows into its head.</p><p>Verse 16 is a masterpiece of organic metaphor: Christ is the head from whom the whole body is joined and held together by every supporting ligament, each part working properly, growing the body in love. The church&rsquo;s health depends on connection to Christ, on the proper working of every member, and on love as the animating principle. MacArthur calls this &ldquo;the most comprehensive description of church growth in the New Testament.&rdquo;</p>"
      }
    ],
    "theology": "<p><strong>The Ascended Christ and His Gifts.</strong> The resurrection and ascension of Christ are not merely biographical facts &mdash; they are the engine of the church&rsquo;s life. The gifts Christ distributes flow from his triumph. To receive a gift is to hold in your hands a token of his conquest. Every preacher, every teacher, every servant in the church is a living reminder that death has been defeated and the Lord is enthroned.</p><p><strong>Every-Member Ministry.</strong> Reformed ecclesiology has always insisted that the whole people of God are ministers. The Reformation recovered the priesthood of all believers. Ephesians 4:12 is its charter: the office-bearers equip; the saints serve. This is not a diminishing of pastoral office but an ennobling of the whole body.</p>",
    "examples": "<p><strong>Then:</strong> In Ephesus, house churches scattered across a pagan city needed teachers who could ground them in apostolic doctrine. Without rooted instruction, new believers were prey to the endless religious novelties of the Roman world &mdash; mystery cults, Gnostic speculation, emperor-cult pressure. The gifted pastor-teachers were the means of keeping the community anchored.</p><p><strong>Now:</strong> The same pressure operates today &mdash; a church without strong biblical teaching is vulnerable to every therapeutic, political, or mystical trend that blows through the culture. The preacher&rsquo;s calling is not to be relevant; it is to equip the saints to stand. The congregation that is deeply taught is the congregation that will not be swept away.</p>",
    "text": "<sup>7</sup>But grace was given to each one of us according to the measure of Christ&rsquo;s gift. <sup>8</sup>Therefore it says, &ldquo;When he ascended on high he led a host of captives, and he gave gifts to men.&rdquo; <sup>9</sup>(In saying, &ldquo;He ascended,&rdquo; what does it mean but that he had also descended into the lower regions, the earth? <sup>10</sup>He who descended is the one who also ascended far above all the heavens, that he might fill all things.) <sup>11</sup>And he gave the apostles, the prophets, the evangelists, the shepherds and teachers, <sup>12</sup>to equip the saints for the work of ministry, for building up the body of Christ, <sup>13</sup>until we all attain to the unity of the faith and of the knowledge of the Son of God, to mature manhood, to the measure of the stature of the fullness of Christ, <sup>14</sup>so that we may no longer be children, tossed to and fro by the waves and carried about by every wind of doctrine, by human cunning, by craftiness in deceitful schemes. <sup>15</sup>Rather, speaking the truth in love, we are to grow up in every way into him who is the head, into Christ, <sup>16</sup>from whom the whole body, joined and held together by every joint with which it is equipped, when each part is working properly, makes the body grow so that it builds itself up in love."
  },
  "10": {
    "ref": "4:17&ndash;32",
    "title": "Put Off, Put On",
    "overview": "<p>This is the hinge passage of the letter. The great doctrinal sweep of chapters 1&ndash;3 now turns into the most concrete ethical imperatives. Paul addresses the Ephesian believers with apostolic authority: <em>you must no longer walk as the Gentiles do.</em> The old life &mdash; with its darkened mind, its hardened heart, its enslavement to sensuality &mdash; is not their identity any more. They have been taught Christ. They have heard him and been taught in him.</p><p>The logic is theological before it is moral. The old self was created after the pattern of Adam &mdash; corrupted, deceived, dying. The new self is created after the pattern of God &mdash; in true righteousness and holiness. The indicative always comes before the imperative: you have been renewed, therefore renew your conduct. What follows in verses 25&ndash;32 is a breathtaking series of paired contrasts: lying/truth, destructive anger/righteous anger resolved, stealing/honest labour given away, corrupting speech/building speech, bitterness/forgiveness. Each pair is rooted not in willpower but in the gospel: forgive as God in Christ has forgiven you.</p>",
    "verseByVerse": [
      {
        "ref": "vv. 17&ndash;19",
        "quote": "&ldquo;&hellip;you must no longer walk as the Gentiles do, in the futility of their minds.&rdquo;",
        "commentary": "<p>Paul traces the anatomy of moral decline with clinical precision. It begins in the mind &mdash; <em>mataiot&#275;ti</em>, futility, emptiness of thought. From intellectual futility comes darkened understanding, then alienation from God&rsquo;s life, then hardness of heart, then sensuality and greed as the self tries to fill the void that only God can fill. The sequence is diagnostic: behaviour flows from belief, and belief corrupted at the root corrupts everything downstream.</p><p>This is not Paul caricaturing paganism &mdash; he is describing what human beings do when they exchange the glory of God for idols (Romans 1). Keller notes that all idolatry is fundamentally futile: we ask finite things to bear the weight only the infinite can carry.</p>"
      },
      {
        "ref": "vv. 20&ndash;24",
        "quote": "&ldquo;But that is not the way you learned Christ!&rdquo;",
        "commentary": "<p>One of Paul&rsquo;s most electrifying phrases. Not &ldquo;learned about Christ&rdquo; &mdash; <em>emathete ton Christon</em> &mdash; learned Christ himself. Christian discipleship is not primarily the acquisition of doctrines about a historical figure; it is the living knowledge of a present Lord. The truth is &ldquo;in Jesus&rdquo; &mdash; it is located in his person.<div class='vnote'><strong>PREACHER&rsquo;S NOTE</strong> The three-fold structure of vv. 22&ndash;24 is put off / be renewed / put on. This is not self-improvement; it is a re-creation. The new self is not the old self improved &mdash; it is a new creation after the likeness of God. The indicative grounds the imperative: this is what you already are; now live accordingly.</div></p><p>The old self is &ldquo;corrupt through deceitful desires&rdquo; &mdash; desires that promise life and deliver death. The new self is created in <em>dikaiosun&#275;</em> (righteousness) and <em>hosiot&#275;ti</em> (holiness) of truth. Both terms have an objective, legal, and relational weight &mdash; this is not emotional experience but moral reality grounded in God&rsquo;s own character.</p>"
      },
      {
        "ref": "v. 25",
        "quote": "&ldquo;Therefore, having put away falsehood, let each one of you speak the truth with his neighbour.&rdquo;",
        "commentary": "<p>The ethical imperatives now flow from the theological reality. Truth-telling is the most basic social act of the new community. Paul grounds it ecclesially: &ldquo;for we are members of one another.&rdquo; Lying to a fellow believer is self-harm &mdash; we are the same body. The lie corrodes the trust that makes communal life possible.</p>"
      },
      {

    "examples": "<p><strong>Then:</strong> The church in Ephesus was drawn from every social stratum &mdash; slaves, freedmen, merchants, and the wealthy. The habits of Roman social life &mdash; status-gaming, sharp dealing, sexual licence, bitter rivalries &mdash; were deeply ingrained. Paul is not asking these believers to improve their manners; he is asking them to live from a completely different centre, a new identity given in Christ.</p><p><strong>Now:</strong> Every congregation mirrors the same challenge. People arrive carrying old patterns &mdash; dishonesty normalised by professional life, anger managed but never healed, speech shaped by social media&rsquo;s contempt culture. The preacher&rsquo;s task is to hold up the mirror of the new self and say: this is who you are in Christ; walk in it. Not &ldquo;try harder&rdquo; but &ldquo;live from what is already true.&rdquo;</p>",
    "text": "<sup>17</sup>Now this I say and testify in the Lord, that you must no longer walk as the Gentiles do, in the futility of their minds. <sup>18</sup>They are darkened in their understanding, alienated from the life of God because of the ignorance that is in them, due to their hardness of heart. <sup>19</sup>They have become callous and have given themselves up to sensuality, greedy to practice every kind of impurity. <sup>20</sup>But that is not the way you learned Christ! &mdash; <sup>21</sup>assuming that you have heard about him and were taught in him, as the truth is in Jesus, <sup>22</sup>to put off your old self, which belongs to your former manner of life and is corrupt through deceitful desires, <sup>23</sup>and to be renewed in the spirit of your minds, <sup>24</sup>and to put on the new self, created after the likeness of God in true righteousness and holiness. <sup>25</sup>Therefore, having put away falsehood, let each one of you speak the truth with his neighbor, for we are members one of another. <sup>26</sup>Be angry and do not sin; do not let the sun go down on your anger, <sup>27</sup>and give no opportunity to the devil. <sup>28</sup>Let the thief no longer steal, but rather let him labor, doing honest work with his own hands, so that he may have something to share with anyone in need. <sup>29</sup>Let no corrupting talk come out of your mouths, but only such as is good for building up, as fits the occasion, that it may give grace to those who hear. <sup>30</sup>And do not grieve the Holy Spirit of God, by whom you were sealed for the day of redemption. <sup>31</sup>Let all bitterness and wrath and anger and clamor and slander be put away from you, along with all malice. <sup>32</sup>Be kind to one another, tenderhearted, forgiving one another, as God in Christ forgave you."

  "11": {
    "ref": "5:1&ndash;21",
    "title": "Walk in Love, Light, Wisdom",
    "overview": "<p>Paul now calls the church to three walks, each more searching than the last, each grounded in who God is and what Christ has done. Walk in love &mdash; the love of a child imitating a Father, the love of a cross. Walk in light &mdash; because you are light, not merely because light is preferable to darkness. Walk in wisdom &mdash; not as fools wasting days, but as those who have been bought back from wasted time and now live filled with the Spirit.</p><p>These are not three separate ethical programmes; they are three facets of the same gospel life. The cross is the measure of love (v. 2). Exposure to the light is the work of the gospel (v. 14). The filling of the Spirit replaces the stupor of wine with songs and gratitude (v. 18). Everything in this passage is saturated in grace. The moral imperative flows from the most profound privilege: you are beloved children of the Most High God &mdash; therefore walk like it.</p>",
    "verseByVerse": [
      {
        "ref": "5:1&ndash;2",
        "quote": "&ldquo;Therefore be imitators of God, as beloved children. And walk in love, as Christ loved us and gave himself up for us.&rdquo;",
        "commentary": "<p><em>Mim&#275;tai tou theou</em> &mdash; imitators of God. The Greek word gives us &ldquo;mime.&rdquo; A child mimics a parent in play; but the grown child imitates a father in earnest. The ground is &ldquo;beloved children&rdquo; &mdash; <em>agap&#275;ta tekna</em>. Our imitation of God flows from our adoption by God. The motivation is love received, not performance demanded.</p><p>The standard of love is the cross: Christ loved us and gave himself up, a fragrant offering to God. The cross is both the demonstration of love and the standard of love. Sproul: &ldquo;The Christian ethic is not a list of rules but a love patterned on a sacrifice.&rdquo;</p>"
      },
      {
        "ref": "vv. 3&ndash;7",
        "quote": "&ldquo;But sexual immorality and all impurity or covetousness must not even be named among you.&rdquo;",
        "commentary": "<p>The shift is sharp: from the highest love to the most concrete sins. Sexual immorality (<em>porneia</em>), impurity (<em>akatharsia</em>), and covetousness are incompatible with the inheritance of God&rsquo;s kingdom. Note the pairing: covetousness is called idolatry (v. 5). To covet is to want something so much that it displaces God as your supreme good. This is why the tenth commandment is the most spiritual: it addresses not conduct but desire.<div class='vnote'><strong>PREACHER&rsquo;S NOTE</strong> Paul&rsquo;s warning in v. 6 is sobering: these are the sins for which &ldquo;the wrath of God comes upon the sons of disobedience.&rdquo; He is not moralising; he is pastorally urgent. The church must not be deceived by empty words that make these things seem acceptable.</div></p>"
      },
      {
        "ref": "vv. 8&ndash;14",
        "quote": "&ldquo;For at one time you were darkness, but now you are light in the Lord. Walk as children of light.&rdquo;",
        "commentary": "<p>Paul does not say you were <em>in</em> darkness and are now in light. He says you <em>were</em> darkness and <em>are</em> light. The identity has changed. This is the logic of new creation: light is not what you achieve but what you are in Christ.</p><p>Verses 11&ndash;14 add a missional dimension: the light of God&rsquo;s people exposes what is hidden. Darkness works in secret; light makes things visible. And then the extraordinary fragment, possibly an early baptismal hymn: &ldquo;Awake, O sleeper, and arise from the dead, and Christ will shine on you.&rdquo; The gospel is a wake-up call to the spiritually dead &mdash; and Christ himself is the light that shines on those who rise.</p>"
      },
      {
        "ref": "vv. 15&ndash;17",
        "quote": "&ldquo;Look carefully then how you walk, not as unwise but as wise, making the best use of the time, because the days are evil.&rdquo;",
        "commentary": "<p><em>Exagorazomenoi ton kairon</em> &mdash; buying back the time, or redeeming the opportunity. <em>Kairos</em> is not clock time but appointed time, moment of opportunity. The days are evil: time is being wasted in darkness around us. The wise person seizes each God-given moment rather than sleepwalking through life.<div class='vnote'><strong>PREACHER&rsquo;S NOTE</strong> This verse is a rebuke to passivity and spiritual drift. &ldquo;Understanding what the will of the Lord is&rdquo; (v. 17) is the practical alternative to being foolish. The will of God is not a mystery to be divined but a word to be learned and obeyed.</div></p>"
      },
      {
        "ref": "vv. 18&ndash;21",
        "quote": "&ldquo;And do not get drunk with wine, for that is debauchery, but be filled with the Spirit.&rdquo;",
        "commentary": "<p>The contrast is not arbitrary. Wine was central to the ecstatic cults of Ephesus &mdash; intoxication as a path to spiritual experience. Paul replaces this with the filling of the Spirit. The Greek imperative is present passive plural: <em>be being filled</em>. It is continuous, communal, and received rather than achieved.</p><p>The results of Spirit-filling are strikingly communal: speaking to one another in psalms, hymns and spiritual songs; singing and making melody to the Lord; giving thanks always; submitting to one another in the fear of Christ. The Spirit-filled life is not a private spiritual high but a community shaped by worship, gratitude, and mutual deference.</p>"
      }
    ],
    "theology": "<p><strong>Imitation of God as Adopted Children.</strong> The call to imitate God (5:1) would be grotesque pride were it not grounded in adoption. We do not imitate God as equals or aspirants; we imitate our Father as children who bear his family likeness. The new birth, not the act of will, is what makes imitation possible. This is why sanctification always rests on justification: we become what we already are in Christ.</p><p><strong>The Spirit-Filled Community.</strong> The filling of the Spirit in verse 18 is the communal counterpart to the individual sealing of 1:13. The Spirit does not fill isolated mystics; he fills a body that sings, gives thanks, and submits. Worship and ethics are inseparable in this vision of the Christian life.</p>",
    "examples": "<p><strong>Then:</strong> The cult of Dionysus and the mystery religions of Ephesus offered ecstatic religious experience through wine, ritual, and spectacle. Paul is offering something better: genuine spiritual fullness through the Holy Spirit, expressed not in private frenzy but in a community of worship and love.</p><p><strong>Now:</strong> The culture still offers its substitutes for the Spirit&rsquo;s fullness &mdash; entertainment, achievement, substances, curated online experience. All promise life and deliver a hangover. The church&rsquo;s alternative is not sobriety as an end in itself but the fullness of the Spirit, which produces the richest life imaginable: deep community, genuine worship, unceasing gratitude, and the freedom of mutual submission.</p>",
    "text": "<sup>1</sup>Therefore be imitators of God, as beloved children. <sup>2</sup>And walk in love, as Christ loved us and gave himself up for us, a fragrant offering and sacrifice to God. <sup>3</sup>But sexual immorality and all impurity or covetousness must not even be named among you, as is proper among saints. <sup>4</sup>Let there be no filthiness nor foolish talk nor crude joking, which are out of place, but instead let there be thanksgiving. <sup>5</sup>For you may be sure of this, that everyone who is sexually immoral or impure, or who is covetous (that is, an idolater), has no inheritance in the kingdom of Christ and God. <sup>6</sup>Let no one deceive you with empty words, for because of these things the wrath of God comes upon the sons of disobedience. <sup>7</sup>Therefore do not become partners with them; <sup>8</sup>for at one time you were darkness, but now you are light in the Lord. Walk as children of light <sup>9</sup>(for the fruit of light is found in all that is good and right and true), <sup>10</sup>and try to discern what is pleasing to the Lord. <sup>11</sup>Take no part in the unfruitful works of darkness, but instead expose them. <sup>12</sup>For it is shameful even to speak of the things that they do in secret. <sup>13</sup>But when anything is exposed by the light, it becomes visible, <sup>14</sup>for anything that becomes visible is light. Therefore it says, &ldquo;Awake, O sleeper, and arise from the dead, and Christ will shine on you.&rdquo; <sup>15</sup>Look carefully then how you walk, not as unwise but as wise, <sup>16</sup>making the best use of the time, because the days are evil. <sup>17</sup>Therefore do not be foolish, but understand what the will of the Lord is. <sup>18</sup>And do not get drunk with wine, for that is debauchery, but be filled with the Spirit, <sup>19</sup>addressing one another in psalms and hymns and spiritual songs, singing and making melody to the Lord with your heart, <sup>20</sup>giving thanks always and for everything to God the Father in the name of our Lord Jesus Christ, <sup>21</sup>submitting to one another out of reverence for Christ."
  },
  "12": {
    "ref": "5:22&ndash;33",
    "title": "Marriage and the Gospel",
    "overview": "<p>This is one of the most breathtaking passages in the entire New Testament &mdash; not primarily because it defines marriage, but because it reveals what marriage has always been about. Paul is not introducing a new code for husbands and wives; he is unveiling the eternal mystery that marriage was always imaging. The husband-wife relationship was designed by God from the beginning as a living picture of Christ and the church. This is the ground of everything. The commands flow from the mystery.</p><p>The wife&rsquo;s submission is not social hierarchy &mdash; it is a participation in the church&rsquo;s glad trust in Christ. The husband&rsquo;s love is not mere affection &mdash; it is a vocation to embody the self-giving of the cross. Both are impossibly high callings. Both are only possible by the power of the Spirit who has just been described filling the body. And at the end, Paul steps back from the marriage illustration and says plainly: <em>I am talking about Christ and the church.</em> Marriage is an enacted parable of the gospel. Every Christian marriage either magnifies or obscures that parable.</p>",
    "verseByVerse": [
      {
        "ref": "vv. 22&ndash;24",
        "quote": "&ldquo;Wives, submit to your own husbands, as to the Lord.&rdquo;",
        "commentary": "<p>The verb &ldquo;submit&rdquo; is not in v. 22 in the Greek &mdash; it carries over from the mutual submission of v. 21 (<em>hypotassomenoi</em>). This is significant: the wife&rsquo;s submission is a particular expression of the general Christian disposition of mutual deference, now patterned on the church&rsquo;s relationship to Christ. It is voluntary, not coerced; relational, not hierarchical in a merely positional sense.<div class='vnote'><strong>PREACHER&rsquo;S NOTE</strong> &ldquo;As to the Lord&rdquo; sets the standard and the motive simultaneously. The wife is not submitting to a general cultural norm but to a husband who, at his best, is being conformed to Christ. The submission is exercised in the context of the cross-shaped love of v. 25. Apart from that context it is easily distorted.</div></p>"
      },
      {
        "ref": "vv. 25&ndash;27",
        "quote": "&ldquo;Husbands, love your wives, as Christ loved the church and gave himself up for her.&rdquo;",
        "commentary": "<p>The husband receives the longer and more demanding instruction. His love is measured by the cross. Christ gave himself up &mdash; <em>paredoken heauton</em> &mdash; wholly, voluntarily, at cost of everything, for the good of his beloved. The purpose was her sanctification and glorification: that she might be holy, without spot or wrinkle, radiant.</p><p>This means the husband&rsquo;s vocation is not to be served but to serve; not to be comfortable but to sacrifice; not to manage his household but to give himself for the flourishing of his wife. MacArthur: &ldquo;No woman has ever been harmed by a man who loved her as Christ loved the church.&rdquo; This is not a complementarian proof-text; it is a cross-shaped calling that leaves no room for selfishness or domination.</p>"
      },
      {
        "ref": "vv. 28&ndash;30",
        "quote": "&ldquo;In the same way husbands should love their wives as their own bodies.&rdquo;",
        "commentary": "<p>Paul grounds the instruction in the creation reality that husband and wife are one flesh (Genesis 2:24). To love one&rsquo;s wife is to love oneself &mdash; they are one. The analogy with how we care for our bodies is pragmatic and tender: we nourish and cherish our bodies; the husband should nourish and cherish his wife. <em>Thalp&#333;</em> &mdash; cherish, keep warm, care for with tenderness. This is not contractual obligation but intimate care.</p>"
      },
      {
        "ref": "vv. 31&ndash;33",
        "quote": "&ldquo;This mystery is profound, and I am saying that it refers to Christ and the church.&rdquo;",
        "commentary": "<p>The <em>myst&#275;rion</em> is the deep truth hidden in the Genesis text &mdash; that the one-flesh union of husband and wife was always a signpost to the union of Christ and his church. Paul has been reading Genesis 2:24 christologically all along. The marriage covenant images the covenant of grace.</p><p>This means that every Christian marriage is a public theology. The way a husband and wife relate to one another in the congregation either commends the gospel or undermines it. Keller writes: &ldquo;Marriage is not mainly about being in love. It is about being a sign.&rdquo; The sign points to the most important love story in history.</p>"
      }
    ],
    "theology": "<p><strong>Marriage as Gospel Parable.</strong> The Reformed tradition has always understood creation ordinances as structures that carry theological meaning. Marriage is not a human social arrangement that Paul spiritualises; it is a divinely appointed institution whose deepest meaning was always christological. The church&rsquo;s trust in Christ and Christ&rsquo;s love for the church are not analogies imported into marriage &mdash; they are the reality that marriage was designed to display. This gives Christian marriage both its dignity and its weight.</p>",
    "examples": "<p><strong>Then:</strong> Greco-Roman marriage was fundamentally an economic and social institution, often entered for political alliance or household management. The idea that a husband should love his wife with the self-giving love of a crucified Saviour was culturally revolutionary. Paul was not adjusting the culture&rsquo;s norms; he was replacing them with something unheard of.</p><p><strong>Now:</strong> Contemporary culture has redefined marriage as primarily a vehicle for personal fulfilment and romantic satisfaction. When it stops fulfilling or satisfying, the partnership dissolves. Paul&rsquo;s vision is both more demanding and more beautiful: marriage is a covenant of self-giving service, bearing witness to a love that did not stop when it became costly. That vision does not need defending so much as it needs displaying.</p>",
    "text": "<sup>22</sup>Wives, submit to your own husbands, as to the Lord. <sup>23</sup>For the husband is the head of the wife even as Christ is the head of the church, his body, and is himself its Savior. <sup>24</sup>Now as the church submits to Christ, so also wives should submit in everything to their husbands. <sup>25</sup>Husbands, love your wives, as Christ loved the church and gave himself up for her, <sup>26</sup>that he might sanctify her, having cleansed her by the washing of water with the word, <sup>27</sup>so that he might present the church to himself in splendor, without spot or wrinkle or any such thing, that she might be holy and without blemish. <sup>28</sup>In the same way husbands should love their wives as their own bodies. He who loves his wife loves himself. <sup>29</sup>For no one ever hated his own flesh, but nourishes and cherishes it, just as Christ does the church, <sup>30</sup>because we are members of his body. <sup>31</sup>&ldquo;Therefore a man shall leave his father and mother and hold fast to his wife, and the two shall become one flesh.&rdquo; <sup>32</sup>This mystery is profound, and I am saying that it refers to Christ and the church. <sup>33</sup>However, let each one of you love his wife as himself, and let the wife see that she respects her husband."
  },
  "13": {
    "ref": "6:1&ndash;4",
    "title": "Children and Fathers",
    "overview": "<p>Paul now addresses children directly &mdash; which in itself is remarkable. In the household codes of the ancient world, children were not moral agents in their own right; they were property. Paul addresses them as persons with responsibilities before God. The command to obey parents is set in the frame of &ldquo;in the Lord&rdquo; &mdash; this is not mere social convention but a matter of Christian discipleship.</p><p>But the passage carries an equal weight on the other side: fathers must not provoke their children to anger. The Greek word <em>ektreph&#333;</em> &mdash; to nourish, to bring to full growth &mdash; and <em>paideia tou kyriou</em> &mdash; the instruction and formation of the Lord &mdash; describe a positive, patient, gospel-shaped fatherhood. This is not passive non-interference; it is active cultivation. The home is a discipleship environment, and the father is its primary teacher.</p>",
    "verseByVerse": [
      {
        "ref": "vv. 1&ndash;3",
        "quote": "&ldquo;Children, obey your parents in the Lord, for this is right.&rdquo;",
        "commentary": "<p>&ldquo;In the Lord&rdquo; qualifies and deepens the obedience: children obey not merely because parents have authority but because Christ is Lord and this is his order for human flourishing. Paul then cites the fifth commandment &mdash; the first commandment with a promise attached. Honour of parents is not a minor matter; it is structurally foundational to the community God builds.<div class='vnote'><strong>PREACHER&rsquo;S NOTE</strong> The promise &mdash; &ldquo;that it may go well with you and that you may live long in the land&rdquo; &mdash; was originally covenant-national (Israel in Canaan) but Paul applies it broadly: obedience to parents is a principle of flourishing woven into the moral fabric of creation.</div></p>"
      },
      {
        "ref": "v. 4",
        "quote": "&ldquo;Fathers, do not provoke your children to anger, but bring them up in the discipline and instruction of the Lord.&rdquo;",
        "commentary": "<p>The prohibition is precise: do not <em>parorgizete</em> &mdash; exasperate, embitter, provoke. The word carries the weight of constant, demoralising criticism, unreasonable demands, or the cold withdrawal of love. These break the spirit rather than shape it.</p><p>The positive command is threefold in its depth: <em>ektrephete</em> (nourish, bring to full growth), <em>paideia</em> (structured training and correction), <em>nouthesia</em> (verbal instruction, counsel, admonition) &mdash; and all of it <em>kyriou</em>, of the Lord. The father is not forming the child in the father&rsquo;s image but in the Lord&rsquo;s image. The whole household is under Christ.</p>"
      }
    ],
    "examples": "<p><strong>Then:</strong> Roman <em>patria potestas</em> gave a father absolute legal authority over his children, including the right of exposure at birth and sale into slavery. Paul&rsquo;s insistence that fathers must not embitter their children and must actively form them in the Lord&rsquo;s instruction was a quiet but profound counter-cultural claim: children are persons before God, not property.</p><p><strong>Now:</strong> Modern fathering tends to the opposite extreme &mdash; either absent or over-permissive. The biblical vision is neither authoritarian harshness nor permissive withdrawal, but engaged, Christ-centred formation. The most important thing a father does is not provide materially or discipline consistently &mdash; it is to make Jesus real in the home by word and example.</p>",
    "text": "<sup>1</sup>Children, obey your parents in the Lord, for this is right. <sup>2</sup>&ldquo;Honor your father and mother&rdquo; (this is the first commandment with a promise), <sup>3</sup>&ldquo;that it may go well with you and that you may live long in the land.&rdquo; <sup>4</sup>Fathers, do not provoke your children to anger, but bring them up in the discipline and instruction of the Lord."
  },
  "14": {
    "ref": "6:5&ndash;9",
    "title": "Servants and Masters",
    "overview": "<p>Paul addresses the most contested relationship in the ancient household: master and slave. He does not overthrow the institution in this letter; he subverts it from within with a logic so radical it eventually dismantles it altogether. Both slave and master serve the same Lord, who shows no partiality. In this framework, the slave&rsquo;s work is rendered not to a human master but to Christ; and the master&rsquo;s authority is exercised under a Master in heaven before whom he will give account.</p><p>The revolutionary force is in the phrase that equalises everything: <em>he who is both their Master and yours is in heaven, and there is no partiality with him.</em> The same Lord owns both. The social hierarchy is provisional; the heavenly reality is permanent. This does not domesticate injustice &mdash; it plants a seed that grows until the tree of human dignity towers over every form of exploitation.</p>",
    "verseByVerse": [
      {
        "ref": "vv. 5&ndash;8",
        "quote": "&ldquo;Bondservants, obey your earthly masters with fear and trembling, with a sincere heart, as you would Christ.&rdquo;",
        "commentary": "<p>Paul addresses the slave first &mdash; itself a gesture of dignity. The command is for whole-hearted service, not eye-service (<em>ophthalmodouleia</em> &mdash; one of Paul&rsquo;s own coinages, perhaps: performing only when watched). The motive is that every act of honest work is rendered to Christ. The slave who works faithfully in a Roman household is serving the Lord of heaven.<div class='vnote'><strong>PREACHER&rsquo;S NOTE</strong> The doctrine of the dignity of ordinary work rests here. There is no hierarchy of &ldquo;sacred&rdquo; and &ldquo;secular&rdquo; work in Christ&rsquo;s service. Every task done with a sincere heart is received by God as service rendered to his Son.</div></p>"
      },
      {
        "ref": "v. 9",
        "quote": "&ldquo;Masters, do the same to them, and stop threatening, knowing that he who is both their Master and yours is in heaven.&rdquo;",
        "commentary": "<p>The master is brought under the same rubric as the slave. He has a Master. His authority is delegated and conditional. He is to treat his slaves with the same integrity of heart he expects from them &mdash; &ldquo;do the same.&rdquo; The specific prohibition &mdash; stop threatening &mdash; targets the master&rsquo;s most characteristic abuse of power. The reason is theological: God shows no partiality. Social status confers no advantage before the throne of heaven.</p><p>This was not an anti-slavery manifesto in the modern sense; it was something more radical in the long run &mdash; it placed master and slave under the same moral governance, the same eternal accountability, the same Lord. The logic, followed to its conclusion, is incompatible with slavery as an institution.</p>"
      }
    ],
    "examples": "<p><strong>Then:</strong> Perhaps a third of the population of Ephesus were slaves. Slaves attended the house churches alongside their masters. The idea that they shared the same Lord, the same Spirit, the same inheritance was both electrifying and deeply subversive of the social order. It did not produce immediate revolution &mdash; but it produced Philemon, the letter where the logic reaches its personal conclusion.</p><p><strong>Now:</strong> Most of us are neither slaves nor masters in the ancient sense. But the principles translate: work done with integrity as unto Christ; authority exercised under accountability to a higher Lord; the irrelevance of social hierarchy before God. The employee who cuts corners when the boss isn&rsquo;t watching, and the manager who treats subordinates as means to an end, are both failing the same test.</p>",
    "text": "<sup>5</sup>Bondservants, obey your earthly masters with fear and trembling, with a sincere heart, as you would Christ, <sup>6</sup>not by the way of eye-service, as people-pleasers, but as bondservants of Christ, doing the will of God from the heart, <sup>7</sup>rendering service with a good will as to the Lord and not to man, <sup>8</sup>knowing that whatever good anyone does, this he will receive back from the Lord, whether he is a bondservant or is free. <sup>9</sup>Masters, do the same to them, and stop threatening, knowing that he who is both their Master and yours is in heaven, and that there is no partiality with him."
  },
  "15": {
    "ref": "6:10&ndash;20",
    "title": "The Armour of God",
    "overview": "<p>Paul has not been writing abstract theology. From beginning to end, Ephesians has been a letter shaped by the awareness that the church exists in a war zone. Now, at the close, he names the enemy, describes the theatre of combat, and equips the church for the fight. This is no conventional warfare; the struggle is not against flesh and blood but against cosmic powers, against the spiritual forces of evil in the heavenly places &mdash; the very realm whose principalities Christ disarmed at the cross (1:21; 3:10).</p><p>The armour Paul describes is not human equipment; it is the armour of God &mdash; his own attributes, his own truth, his own righteousness, the gospel of his peace, his salvation, his word. The soldier does not manufacture the armour; he puts on what God provides. And the result of putting it all on is not conquest but standing &mdash; holding the ground that Christ has won. The battle is real. The outcome is certain. The armour is sufficient. And prayer is the breath of the soldier who wears it.</p>",

        "commentary": "<p>Each piece of armour corresponds to a grace from God:</p><p><strong>Belt of truth</strong> &mdash; integrity of life, aligning inner conviction with outer conduct. The belt holds everything together; truth is the foundation of all the rest.</p><p><strong>Breastplate of righteousness</strong> &mdash; most likely the imputed righteousness of Christ that protects the heart from the accusation of the enemy. The devil&rsquo;s primary weapon is condemnation; the righteous verdict of the gospel is the breastplate.</p><p><strong>Shoes of the gospel of peace</strong> &mdash; readiness to carry the good news, stability to stand firm. The gospel gives the soldier sure footing.</p><p><strong>Shield of faith</strong> &mdash; the large Roman <em>thureos</em>, door-shaped, which could interlock with others. Faith quenches the flaming arrows of doubt, accusation, and temptation.</p><p><strong>Helmet of salvation</strong> &mdash; the assurance of salvation protects the mind from despair and doubt about one&rsquo;s standing before God.</p><p><strong>Sword of the Spirit</strong> &mdash; the only offensive weapon: the word of God. The same word Jesus wielded against the devil in the wilderness. The Christian&rsquo;s attack is always the truth of Scripture.</p>"

    "theology": "<p><strong>The Already-Not Yet Warfare.</strong> The powers and principalities Christ defeated at the cross are real but defeated enemies. The Christian&rsquo;s warfare is not to win a victory but to hold ground that has already been won. This shapes the entire posture of Christian living: we fight from triumph, not toward it. The armour is God&rsquo;s armour, not our own. The outcome is never in doubt; but the battle is never not real.</p><p><strong>Prayer as Warfare.</strong> The movement from armour to prayer is seamless in Paul&rsquo;s thought. The armour describes our standing; prayer is the means by which we maintain it. Prayer is not the believer&rsquo;s last resort but the soldier&rsquo;s first language &mdash; the acknowledgement that all strength comes from the Lord of the battle.</p>",
    "examples": "<p><strong>Then:</strong> The Ephesian church lived in a city saturated with occult practice &mdash; Ephesus was famous for its magical papyri and its Artemis cult. The principalities and powers Paul describes were not abstract to believers who had recently burned their magic books (Acts 19:19). The armour was immediately practical: how do you stand firm in a city where spiritual powers were daily realities?</p><p><strong>Now:</strong> The Western church has largely lost the sense of spiritual warfare &mdash; which may be why it is losing so many battles. The principalities and powers work today through ideologies, cultural narratives, and the slow erosion of biblical truth from minds and hearts. The armour is still needed. The sword of the Spirit is still the only offensive weapon. And the preacher who prays is the most dangerous person in the room.</p>",

    "overview": "<p>Letters end where relationships live. After the vast theological and ethical sweep of this letter &mdash; election before creation, dead raised to life, the dividing wall demolished, the mystery of the ages revealed, the armour of God donned for the final stand &mdash; Paul closes with names and faces. Tychicus, the beloved brother, the faithful minister, will carry the letter and will tell them everything. This is how the gospel has always travelled: through people who are loved and trusted.</p><p>The benediction is among the most compressed and profound in all of Paul. Grace, peace, love, and faith &mdash; the four great gifts of God &mdash; flow from the Father and the Son together to all who love Jesus Christ with undying love. The letter that began in the eternal purposes of God before the foundation of the world ends with an imperishable love. And it is the same love at both ends: the love of God, lavished freely, held forever.</p>",

    "examples": "<p><strong>Then:</strong> Tychicus would have walked into the house church in Ephesus with this letter, sat down among believers who were navigating Roman society, Jewish opposition, and pagan pressure, and read these words aloud. The letter began with who they were in Christ before the foundation of the world; it ended with a brother standing before them, reminding them they were not alone.</p><p><strong>Now:</strong> Every time this letter is preached, Tychicus rides again &mdash; in the form of the preacher who carries the word to the congregation. The task is the same: to tell them what Paul told the Ephesians, to strengthen their hearts, to send them back into the week knowing they are elect, alive, reconciled, indwelt, equipped, and loved with an imperishable love. That is enough. That is everything.</p>",

    "title": "The Letter to the Ephesians",
    "overview": "<p>Paul wrote this letter from a Roman prison, around AD&nbsp;60&ndash;62, awaiting trial before Caesar. He was chained to a guard. And from that cell he wrote what R.C. Sproul called &ldquo;the most majestic letter Paul ever penned&rdquo; &mdash; a letter so vast in its theological vision, so soaring in its doxology, that it feels less like correspondence and more like a window thrown open onto eternity.</p><p>The letter may have been circular &mdash; several early manuscripts omit the words &ldquo;in Ephesus&rdquo; from 1:1, suggesting it was passed between the churches of Asia Minor. Tychicus carried it personally (6:21). Whether it reached one church or many, it was written for the whole church in every age &mdash; including yours.</p><p><strong>The heartbeat phrase is <em>in Christ</em></strong>, appearing over thirty times. Everything God has done, is doing, and will do for his people is located in the person of his Son. Chosen in him. Redeemed in him. Raised with him. Seated with him. Built together in him. The letter is not primarily about what Christians must do; it is about who Christians already are &mdash; and the doing flows from the being.</p><p><strong>The grand theme</strong> is God&rsquo;s eternal purpose to unite all things in Christ &mdash; things in heaven and things on earth (1:10). The church is not a human institution that God blesses; it is the centrepiece of his cosmic plan, the body through which the manifold wisdom of God is displayed to the watching principalities and powers (3:10). To be part of this church is to be enrolled in the most significant project in the universe.</p><p><strong>The structure</strong> is clean and powerful. Chapters 1&ndash;3 are the great <em>indicative</em>: what God has done in Christ from before the foundation of the world to the present moment. Chapters 4&ndash;6 are the great <em>imperative</em>: how the people of God now walk, in every relationship and in every spiritual battle. The hinge is the word &ldquo;therefore&rdquo; in 4:1 &mdash; one of the most consequential words in Christian ethics. The imperative is always grounded in the indicative. We do not obey in order to be accepted; we obey because we already are.</p><p><strong>Preach this letter</strong> and you will give your congregation the full panorama of God&rsquo;s saving purpose, from the eternal counsel of the Trinity before creation to the armour for the battle they face this week. There is nothing higher in Paul. There may be nothing higher in Scripture.</p>",
