<style>

<script type="application/json" id="chdata">{
  "1": {
    "ref": "1:1&ndash;2",
    "title": "Greeting",
    "overview": "<p>Even two verses. Paul does not merely say hello &mdash; he opens with a title that is not self-promotion but a declaration of origin. He is an apostle by the will of God. Before a single argument has been made, before a single doctrine stated, he has located the source of everything that follows: not human insight, not church appointment, not personal ambition, but the will of the God who makes and unmakes, calls and sends. The letter that follows &mdash; with its soaring Christology, its vision of a church that displays the wisdom of God to the watching cosmos, its armour forged in the heavenly places &mdash; comes from a man who knows he is a sent one, and knows who sent him.</p><p>But the greeting also contains the entire gospel in two words: grace and peace. Grace first &mdash; always grace first &mdash; the undeserved, unearned, inexhaustible favour of God that is the source and substance of everything Paul will spend six chapters describing. Peace second &mdash; the shalom that grace alone produces, the end of hostility between the holy God and the guilty creature. These are not pleasantries. They are the two coordinates of the Christian life, and they flow from a single double source: God the Father and the Lord Jesus Christ. The letter begins where everything must begin.</p>",
    "verseByVerse": [
      {
        "ref": "v. 1",
        "quote": "&ldquo;Paul, an apostle of Christ Jesus by the will of God, to the saints who are in Ephesus.&rdquo;",
        "commentary": "<p><em>Apostolos</em> means &ldquo;sent one&rdquo; &mdash; the word used for an official ambassador carrying the full authority of the one who dispatched him. The qualifier &ldquo;by the will of God&rdquo; is not incidental: Paul&rsquo;s authority to declare the mystery of God&rsquo;s purposes in chapters 2&ndash;3 rests entirely on this commission. He did not volunteer; he was made.</p><p>&ldquo;Saints&rdquo; (<em>hagioi</em>) &mdash; set-apart ones, holy ones. Not a title earned by moral achievement but a status conferred by belonging to God. In Paul&rsquo;s vocabulary every believer is a saint. The word is used nine times in Ephesians; it is the community&rsquo;s foundational identity before any conduct is described.</p><p>Some manuscripts omit &ldquo;in Ephesus,&rdquo; suggesting the letter may have circulated as a general epistle to the churches of the region. This does not diminish its authority; it extends its reach.</p>"
      },
      {
        "ref": "v. 2",
        "quote": "&ldquo;Grace to you and peace from God our Father and the Lord Jesus Christ.&rdquo;",
        "commentary": "<p>The standard Pauline greeting, but never merely formulaic. <em>Charis</em> (grace) transforms the ordinary Greek greeting <em>chairein</em> into a theological declaration: the entire gift of God&rsquo;s undeserved favour. <em>Eirene</em> (peace) carries the Hebrew <em>shalom</em>: not the absence of conflict but the positive flourishing of a life rightly ordered to God.</p><p>The double source &mdash; &ldquo;from God our Father <em>and</em> the Lord Jesus Christ&rdquo; &mdash; places Father and Son on the same grammatical and theological level as the single origin of both gifts. Casual Trinitarian theology, stated before the letter has even begun.</p>"
      }
    ],
    "examples": "<p><strong>Then:</strong> Paul&rsquo;s audience knew exactly what an apostle was &mdash; a plenipotentiary ambassador whose word carried the weight of the sender. When a Roman emperor despatched his legate to a province, that legate&rsquo;s word was the emperor&rsquo;s word. Paul claims that authority &mdash; not for himself but for the message he carries.</p><p><strong>Now:</strong> The word &ldquo;apostle&rdquo; is widely misapplied today to church planters and senior leaders. Paul&rsquo;s use is the opposite of self-promotion: his authority is entirely derivative. He matters only because of who sent him. Every preacher who opens this letter does well to remember the same: the authority belongs to the text, not to the one holding it.</p>",
    "text": "<sup>1</sup>Paul, an apostle of Christ Jesus by the will of God, To the saints who are in Ephesus, and are faithful in Christ Jesus: <sup>2</sup>Grace to you and peace from God our Father and the Lord Jesus Christ."
  },
  "2": {
    "ref": "1:3&ndash;14",
    "title": "Every Spiritual Blessing",
    "overview": "<p>One sentence. In the Greek, verses 3 through 14 are a single, unbroken, breathless sentence &mdash; 202 words without a full stop. It is the longest sentence in the New Testament, and it is not theology presented as careful argument but theology erupting as praise. A man who has seen what God has done in Christ cannot contain it in normal syntax; the sentence keeps going because the reality keeps going. Before Paul has issued a single command, before he has described a single Christian duty, he has spent 202 words worshipping the God who did it all.</p><p>The architecture is Trinitarian and magnificent: the Father elects before the foundation of the world (vv.&nbsp;4&ndash;6), the Son redeems through his blood (vv.&nbsp;7&ndash;12), the Spirit seals as the guarantee of the inheritance (vv.&nbsp;13&ndash;14). And each movement ends with the same refrain: <em>to the praise of his glory</em>. Everything in salvation is oriented outward toward God. The election, the redemption, the sealing &mdash; all of it designed not primarily for the comfort of the recipients but for the praise of the Giver. The preacher who handles this passage and leaves the congregation with a theology problem rather than a doxology has not yet entered the text.</p>",
    "verseByVerse": [
      {
        "ref": "v. 3",
        "quote": "&ldquo;Blessed be the God and Father of our Lord Jesus Christ, who has blessed us in Christ with every spiritual blessing in the heavenly places.&rdquo;",
        "commentary": "<p>Three uses of the blessing root (<em>eulogeo / eulogia</em>) in one verse: God is to be blessed (praised) because he has blessed (given) us. The blessings are &ldquo;spiritual&rdquo; &mdash; not meaning immaterial, but coming from and consisting in the Holy Spirit. &ldquo;Every&rdquo; spiritual blessing: not some, not the ones we have earned, but the entire treasury. The word &ldquo;in Christ&rdquo; will govern the entire doxology: every blessing is located in him, accessible only through union with him.</p><p>&ldquo;Heavenly places&rdquo; (<em>epouraniois</em>) is a phrase unique to Ephesians (1:3, 20; 2:6; 3:10; 6:12). It describes the realm of spiritual reality where the decisive events occur and from which the decisive blessings flow. The Christian&rsquo;s life is simultaneously earthly and heavenly &mdash; the blessings are already fully given in the heavenly realm even while they are being worked out on earth.</p>"
      },
      {
        "ref": "v. 4",
        "quote": "&ldquo;Even as he chose us in him before the foundation of the world, that we should be holy and blameless before him.&rdquo;",
        "commentary": "<p>Election. Before creation existed, before time began, before any human merit was possible or conceivable, God chose his people in Christ. The basis is entirely within God &mdash; no human quality, no foreseen faith, no anticipated response provided the grounds.</p><p>The purpose of election is crucial: &ldquo;that we should be holy and blameless.&rdquo; Election is not a doctrine for theological argument; it is a doctrine for worship and moral transformation. The one who knows he was chosen before the world began has the deepest possible motivation for the holiness that was the purpose of that choosing. Election precedes holiness; it does not replace it.</p>"
      },
      {
        "ref": "v. 5",
        "quote": "&ldquo;In love he predestined us for adoption to himself as sons through Jesus Christ, according to the purpose of his will.&rdquo;",
        "commentary": "<p>&ldquo;In love&rdquo; almost certainly modifies predestination rather than what precedes: it was in love that he predestined. Predestination is not cold decree but the Father&rsquo;s affectionate purpose to have children. The warmth of the word &ldquo;adoption&rdquo; confirms it.</p><p>&ldquo;Adoption&rdquo; (<em>huiothesia</em>) is a legal term for the full conferral of sonship on someone not born to it. Roman adoption was irrevocable and conferred complete inheritance rights. The adopted son had all the standing of a biological heir &mdash; the past could not reclaim him. &ldquo;According to the purpose of his will&rdquo; &mdash; the ground is entirely within God. This is not a harsh doctrine; it is the guarantee of its permanence.</p>"
      },
      {
        "ref": "v. 6",
        "quote": "&ldquo;To the praise of his glorious grace, with which he has blessed us in the Beloved.&rdquo;",
        "commentary": "<p>The first of three &ldquo;to the praise of his glory&rdquo; refrains (vv.&nbsp;6, 12, 14), marking the three Trinitarian movements of the doxology. Every section ends at the same destination: God praised. Salvation has a design beyond the saved.</p><p>&ldquo;The Beloved&rdquo; &mdash; a title for Christ that echoes the Father&rsquo;s voice at the baptism (&ldquo;This is my beloved Son&rdquo;) and the transfiguration. The blessings come to us because we are in the one who is supremely loved. We receive what belongs to him because we are in him.</p>"
      },
      {
        "ref": "v. 7",
        "quote": "&ldquo;In him we have redemption through his blood, the forgiveness of our trespasses, according to the riches of his grace.&rdquo;",
        "commentary": "<p>&ldquo;Redemption&rdquo; (<em>apolutrosis</em>) is the language of the slave market and the exodus: the payment of a price to secure release. The price is specific: his blood. Not his teaching, not his example, not his moral influence &mdash; his blood. Forgiveness is the content of what redemption achieves: the actual cancellation of actual sins.</p><p>&ldquo;According to the riches of his grace&rdquo; &mdash; not the minimum, not the merely adequate, but proportioned to the wealth of God&rsquo;s own grace. This is a lavish transaction, not a careful one.</p>"

      {

        "quote": "&ldquo;Which he lavished upon us, in all wisdom and insight.&rdquo;",
        "commentary": "<p>&ldquo;Lavished&rdquo; &mdash; poured out abundantly, overflowing. God did not give grace carefully, measuring out precisely what was sufficient. He poured. The grace is not sentimental, however: it was given &ldquo;in all wisdom and insight&rdquo; &mdash; with full knowledge of what we are and what we need. The lavishness and the wisdom belong together: it is not reckless giving but intelligent abundance.</p>"
      },
      {
        "ref": "vv. 9&ndash;10",
        "quote": "&ldquo;Making known to us the mystery of his will&hellip; to unite all things in him, things in heaven and things on earth.&rdquo;",
        "commentary": "<p>The &ldquo;mystery&rdquo; (<em>mysterion</em>) is not a puzzle but a previously hidden plan now disclosed. God&rsquo;s ultimate purpose is cosmic: the <em>anakephalaiosis</em> &mdash; re-heading, summing up, reuniting all things under one head &mdash; in Christ. The fragmentation of creation introduced by sin will be reversed. Every broken relationship, every disordered structure, every alienated creature will find its proper place under Christ&rsquo;s headship.</p><p>This is not merely personal salvation; it is cosmic renovation. The gospel is large enough to encompass the entirety of what sin has broken. Nothing will be left outside the restoration.</p>"
      },
      {
        "ref": "vv. 11&ndash;12",
        "quote": "&ldquo;In him we have obtained an inheritance, having been predestined according to the purpose of him who works all things according to the counsel of his will.&rdquo;",
        "commentary": "<p>&ldquo;Who works all things according to the counsel of his will&rdquo; &mdash; one of the strongest statements of divine sovereignty in the New Testament. Not some things. Not most things. All things. The counsel is God&rsquo;s own deliberate plan, not his reaction to human choices. This is not uncomfortable; it is the ground of confidence that the inheritance will be delivered.</p><p>&ldquo;We who were the first to hope in Christ&rdquo; likely refers to Jewish believers, anticipating the Gentile inclusion announced in v.&nbsp;13. The full picture requires both.</p>"
      },
      {
        "ref": "vv. 13&ndash;14",
        "quote": "&ldquo;You also&hellip; were sealed with the promised Holy Spirit, who is the guarantee of our inheritance until we acquire possession of it.&rdquo;",
        "commentary": "<p>&ldquo;You also&rdquo; &mdash; now the Gentiles. The same election, the same redemption, the same sealing. The Spirit is the seal: in antiquity a seal conveyed ownership, authenticity, and security. God has stamped his ownership on every believer. The Spirit cannot be revoked; the ownership stands.</p><p>The Spirit is also the <em>arrab&omacr;n</em> &mdash; the guarantee, the down payment, the first instalment of the full inheritance still to come. What the Spirit gives now is not the whole but the taste, the proof, the pledge of everything that is coming. The &ldquo;until&rdquo; is eschatological: the Spirit holds the believer sealed until the day the full possession is received.</p>"
      }
    ],
    "theology": "<p><strong>Election, Adoption, and the Trinity in Salvation.</strong> Ephesians 1:3&ndash;14 is the most compressed Trinitarian soteriology in Scripture. The Father elects (vv.&nbsp;4&ndash;6), the Son redeems (vv.&nbsp;7&ndash;12), the Spirit seals (vv.&nbsp;13&ndash;14) &mdash; and each act ends in the praise of God&rsquo;s glory. Reformed theology has consistently insisted that salvation is entirely the work of God: originating in the Father&rsquo;s eternal choice, accomplished by the Son&rsquo;s substitutionary death, applied by the Spirit&rsquo;s sealing. Nothing in this text gives the human will a role in initiating, securing, or guaranteeing salvation. Everything flows from the will of God &mdash; and Paul&rsquo;s response is not passivity but explosion into praise. The doctrine of election does not shrink the gospel; in Paul&rsquo;s hands it is the engine of the largest doxology in the New Testament.</p>",
    "examples": "<p><strong>Then:</strong> The church at Ephesus was a Gentile-majority congregation with no natural claim to Israel&rsquo;s covenant blessings. The &ldquo;you also&rdquo; of v.&nbsp;13 would have been electrifying &mdash; people who had worshipped Artemis, who had no history with the God of Abraham, being told they were chosen before the foundation of the world, adopted as sons, sealed with the Spirit. The doxology was not abstract theology to them; it was the story of their own impossible inclusion.</p><p><strong>Now:</strong> The doctrine of election is one of the most contested in contemporary Christianity. But Paul does not introduce it as a debating point; he introduces it as a reason to praise. The preacher who handles this passage and leaves the congregation with a theology problem rather than a doxology has missed the entire register of the text. In Ephesians 1, election is meant to produce what it produces in Paul: unstoppable, overflowing, 202-word worship of the God who did it all.</p>",
    "text": "<sup>3</sup>Blessed be the God and Father of our Lord Jesus Christ, who has blessed us in Christ with every spiritual blessing in the heavenly places, <sup>4</sup>even as he chose us in him before the foundation of the world, that we should be holy and blameless before him. In love <sup>5</sup>he predestined us for adoption to himself as sons through Jesus Christ, according to the purpose of his will, <sup>6</sup>to the praise of his glorious grace, with which he has blessed us in the Beloved. <sup>7</sup>In him we have redemption through his blood, the forgiveness of our trespasses, according to the riches of his grace, <sup>8</sup>which he lavished upon us, in all wisdom and insight <sup>9</sup>making known to us the mystery of his will, according to his purpose, which he set forth in Christ <sup>10</sup>as a plan for the fullness of time, to unite all things in him, things in heaven and things on earth. <sup>11</sup>In him we have obtained an inheritance, having been predestined according to the purpose of him who works all things according to the counsel of his will, <sup>12</sup>so that we who were the first to hope in Christ might be to the praise of his glory. <sup>13</sup>In him you also, when you heard the word of truth, the gospel of your salvation, and believed in him, were sealed with the promised Holy Spirit, <sup>14</sup>who is the guarantee of our inheritance until we acquire possession of it, to the praise of his glory."
  },
  "3": {
    "ref": "1:15&ndash;23",
    "title": "Paul&rsquo;s First Prayer",
    "overview": "<p>After 202 words of doxology, Paul turns from praise to intercession &mdash; and notice what he does not pray for. He does not pray for the safety of the Ephesians, their comfort, their numbers, or their influence in the city. He prays that they would <em>know God better</em>. The entire content of the prayer is on the knowing end, not the having end: a spirit of wisdom and revelation, eyes of the heart enlightened, understanding of three specific realities &mdash; the hope of their calling, the riches of God&rsquo;s inheritance in the saints, and the immeasurable greatness of his power. Paul&rsquo;s assumption is that the greatest need of the church is not more resources, more protection, or better circumstances &mdash; it is deeper knowledge of the God who has already given them every spiritual blessing.</p><p>The prayer then opens into a vision of the ascended Christ that takes the breath away. Far above every rule, authority, power, and dominion. All things under his feet. Head over all things <em>to the church</em> &mdash; the cosmic headship exercised on behalf of his people. And then the most staggering sentence: the church is his body, the fullness of the one who fills all in all. The infinite Christ, who fills the universe, considers the church his completion, his expression, his fullness in the world. The preacher who reads that sentence without stopping has not yet let it land.</p>",
    "verseByVerse": [

        "ref": "vv. 15&ndash;16",

        "commentary": "<p>&ldquo;For this reason&rdquo; connects back to the entire doxology: because of all that God has done in Christ, Paul prays. Thanksgiving precedes petition &mdash; the order is deliberate. The prayer is grounded in what God has already accomplished, not driven by what is still lacking. It is a prayer of grateful sufficiency reaching for greater knowledge, not anxious insufficiency reaching for more resources.</p>"
      },
      {
        "ref": "v. 17",
        "quote": "&ldquo;That the God of our Lord Jesus Christ, the Father of glory, may give you the Spirit of wisdom and revelation in the knowledge of him.&rdquo;",
        "commentary": "<p>&ldquo;The Father of glory&rdquo; &mdash; a title that gathers everything from the doxology: the God whose very nature is glory, whose purposes produce glory, who acts for the praise of his glory. Every word of the address before the petition is itself worship.</p><p>The &ldquo;Spirit of wisdom and revelation&rdquo; is not a second giving of the Spirit (already received, v.&nbsp;13) but the Spirit in his function as illuminator &mdash; opening up what is already true about God to the eyes of the heart. Natural intelligence cannot see what Paul is asking God to show. The knowledge of God requires a supernatural gift of perception.</p>"
      },
      {
        "ref": "v. 18",
        "quote": "&ldquo;Having the eyes of your hearts enlightened, that you may know what is the hope to which he has called you, what are the riches of his glorious inheritance in the saints.&rdquo;",
        "commentary": "<p>&ldquo;Eyes of the heart&rdquo; &mdash; in biblical anthropology the heart is not primarily the emotions but the centre of the person, the seat of understanding and will. The heart needs its own eyes: organs of perception that natural intelligence cannot provide. This is why Paul prays rather than simply argues: he knows that what he is asking them to see requires more than information.</p><p>&ldquo;His glorious inheritance <em>in the saints</em>&rdquo; &mdash; notice the direction. Not our inheritance in God (which is also true) but God&rsquo;s inheritance in us. We are his treasure. The God who owns the universe counts his people as his inheritance. This is not a small thought.</p>"
      },
      {
        "ref": "vv. 19&ndash;20",
        "quote": "&ldquo;And what is the immeasurable greatness of his power toward us who believe, according to the working of his great might that he worked in Christ when he raised him from the dead.&rdquo;",
        "commentary": "<p>Paul stacks four Greek words for power in these verses: <em>dunamis</em> (power), <em>energeia</em> (working/energy), <em>kratos</em> (strength/dominion), <em>ischus</em> (force). He is reaching for the limits of the language. No single word is sufficient; he uses all four at once.</p><p>The power available to believers is not a metaphor or a pious encouragement &mdash; it is specifically identified as the same power that raised a corpse to life and seated it at the right hand of all authority. Resurrection power is the operative power in the Christian life. If you want to know the scale of what God is willing to exert on behalf of those who believe, look at the empty tomb.</p>"
      },
      {

        "commentary": "<p>&ldquo;Gave him as head over all things <em>to the church</em>&rdquo; &mdash; the cosmic headship of Christ over all creation is given as a gift to the church. The one who rules everything rules it on behalf of his people. That is not a small thing to know when the world feels out of control.</p><p>&ldquo;The fullness of him who fills all in all&rdquo; (<em>to pleroma tou ta panta en pasin pleroumenou</em>) &mdash; the infinite Christ, who fills the cosmos, considers the church to be his fullness, his expression in the world. The church is not a religious organisation under Christ&rsquo;s endorsement. It is the body through which the head who fills all things makes himself visible on earth.</p>"

    "theology": "<p><strong>Union with Christ.</strong> The phrase &ldquo;in Christ&rdquo; or &ldquo;in him&rdquo; appears over and over in chapter 1 (vv.&nbsp;3, 4, 7, 9, 10, 11, 13). Every blessing, every election, every redemption, every sealing is &ldquo;in Christ.&rdquo; This is the doctrine of union with Christ &mdash; the foundational category of Pauline soteriology. Believers do not merely receive benefits from Christ at a distance; they are placed <em>in him</em>, identified with him, so that what is true of him becomes true of them. The same power that raised Christ from the dead is at work in believers (v.&nbsp;19&ndash;20) precisely because they are in the one who was raised. Union with Christ is not mystical abstraction; it is the structural logic of everything Paul says in this letter.</p>",
    "examples": "<p><strong>Then:</strong> The Ephesian believers lived in a city dominated by the cult of Artemis, by mystery religions, by imperial power and the Roman gods. &ldquo;Rule, authority, power, dominion&rdquo; were not abstract categories to them &mdash; these were the powers that held the city in fear. Paul is saying: the one you now belong to is not competing with these powers. He is above them. Categorically, permanently, absolutely above them.</p><p><strong>Now:</strong> The church often behaves as though it needs the culture&rsquo;s approval, the government&rsquo;s favour, or the right social conditions to function effectively. Paul&rsquo;s prayer is the antidote: eyes opened to see who Christ actually is &mdash; far above every authority that currently intimidates us. The prayer is not for better circumstances but for better sight. The circumstances have not changed what is true; the church simply needs to see it.</p>",

  "4": {
    "ref": "2:1&ndash;10",
    "title": "Dead, Alive, Created",
    "overview": "<p>If chapter 1 is the mountain of divine election seen from eternity, chapter 2 is the valley of human condition seen from the ground &mdash; and Paul does not soften either. You were dead. Not ill, not wounded, not spiritually weakened. Dead. The language is chosen with surgical precision. A dead person does not need encouragement or improvement or the activation of latent spiritual potential. A dead person needs resurrection. And that is exactly what God provides.</p><p>The movement of this passage is the most dramatic in the New Testament: from dead in sin (v.&nbsp;1) to seated in the heavenly places (v.&nbsp;6) in the space of six verses. And the hinge on which that movement turns is a two-word pivot that stands at the centre of the entire Bible: <em>but God</em>. Everything before those two words is our condition; everything after them is his action. The God who is rich in mercy, who loved with a great love, who acted while we were still dead and unable to cooperate &mdash; this God raised us, seated us, and is now displaying us to the coming ages as the exhibit of his inexhaustible grace.</p><p>The passage closes with the verse that has shattered every claim of human boasting: saved by grace through faith, not of works, lest anyone boast. But it does not end there. The grace that excludes boasting produces the works it always intended &mdash; prepared in advance, laid out like a track for the redeemed life to run on.</p>",
    "verseByVerse": [
      {
        "ref": "vv. 1&ndash;2",

        "commentary": "<p>&ldquo;Dead&rdquo; (<em>nekrous</em>) &mdash; not metaphorically weakened but genuinely dead to God, incapable of spiritual response or initiative toward him. Trespasses (<em>paraptomata</em>) are deliberate steppings-across; sins (<em>hamartia</em>) is missing the mark &mdash; together they cover the full range of human failure: the deliberate and the inadvertent, the rebellious and the negligent.</p><p>&ldquo;The course of this world&rdquo; (<em>aion</em>) &mdash; the spirit of the age, the invisible current that carries everyone who is not actively swimming against it. &ldquo;The prince of the power of the air&rdquo; &mdash; Satan, not as a petty adversary but as the ruling spirit behind the age&rsquo;s direction. The unregenerate person is simultaneously following the crowd and following a cosmic enemy who is directing it.</p>"

        "quote": "&ldquo;We all once lived in the passions of our flesh&hellip; and were by nature children of wrath, like the rest of mankind.&rdquo;",
        "commentary": "<p>&ldquo;We all&rdquo; &mdash; Paul includes himself and Jewish believers. This is not Gentile pathology; it is the human condition without distinction. &ldquo;Children of wrath&rdquo; &mdash; not people who occasionally attracted God&rsquo;s wrath but people whose nature was oriented toward the wrath they deserved.</p><p>&ldquo;By nature&rdquo; (<em>phusei</em>) &mdash; this is the Reformed doctrine of original sin in two words. The fallenness is not an external imposition but constitutive of human nature since the fall. The problem is not primarily what we do but what we are.</p>"
      },
      {
        "ref": "vv. 4&ndash;5",
        "quote": "&ldquo;But God, being rich in mercy, because of the great love with which he loved us, even when we were dead in our trespasses, made us alive together with Christ.&rdquo;",
        "commentary": "<p>&ldquo;But God.&rdquo; Two words. The pivot of the passage, the pivot of redemptive history, the pivot of every Christian life. Everything before: our death, our slavery, our deserved wrath. Everything after: his mercy, his love, his action.</p><p>&ldquo;Rich in mercy&rdquo; &mdash; not adequate mercy, not sufficient mercy &mdash; rich, abundant, overflowing. The love is &ldquo;great&rdquo; (<em>pollen</em>) and it acted &ldquo;even when we were dead&rdquo; &mdash; not when we improved, not when we responded, but when we were dead and incapable of response. Salvation is resurrection, and the dead do not cooperate in their own raising. The initiative is entirely God&rsquo;s.</p>"
      },
      {
        "ref": "v. 6",
        "quote": "&ldquo;And raised us up with him and seated us with him in the heavenly places in Christ Jesus.&rdquo;",
        "commentary": "<p>Three verbs, all beginning with &ldquo;with&rdquo; (<em>sun-</em>) in Greek: made alive <em>with</em>, raised <em>with</em>, seated <em>with</em>. What happened to Christ has happened to the believer by virtue of union with him. The believer&rsquo;s status in the heavenly places is not a future aspiration &mdash; it is a present reality. Already seated. The positional truth is complete; the experiential reality is being worked out in time.</p>"
      },
      {

        "commentary": "<p>The purpose of salvation includes cosmic display. In the ages to come, every saved sinner will be an exhibit of the riches of God&rsquo;s grace. The church is God&rsquo;s trophy case. This is not a secondary purpose; it is the stated reason behind the rescue. God is glorifying himself through the salvation of those who did not deserve it.</p>"
      },
      {
        "ref": "vv. 8&ndash;9",
        "quote": "&ldquo;For by grace you have been saved through faith. And this is not your own doing; it is the gift of God, not a result of works, so that no one may boast.&rdquo;",
        "commentary": "<p>The &ldquo;this is not your own doing&rdquo; most likely refers to the entire salvation package &mdash; grace, faith, the whole event &mdash; not just the faith. Faith itself is not a human contribution that triggers God&rsquo;s grace; faith is the instrument through which grace is received, and the whole transaction is the gift of God.</p><p>&ldquo;So that no one may boast&rdquo; &mdash; the design of grace is the elimination of human pride in the transaction of salvation. This is not a consequence Paul has noticed; it is the intention God had. The glory belongs entirely to the Giver. MacArthur has observed: if even one element of salvation depended on human cooperation, the difference between the saved and the unsaved would ultimately be traceable to something in the human &mdash; and Paul will not allow that.</p>"

        "commentary": "<p>&ldquo;Workmanship&rdquo; (<em>poiema</em>) &mdash; the word from which &ldquo;poem&rdquo; comes. We are God&rsquo;s work of art, his craftsmanship. The same God who spoke creation into being has spoken new creation into us.</p><p>The good works are not the basis of salvation (vv.&nbsp;8&ndash;9) but its purpose &mdash; and they are themselves prepared by God in advance. Grace that excludes boasting does not exclude works; it produces them, lays them out like a track, and then enables the redeemed person to walk in them. The obedience is no less real for being prepared; it is no less the believer&rsquo;s for being given.</p>"

    "theology": "<p><strong>Total Depravity and Sovereign Grace.</strong> Ephesians 2:1&ndash;10 is one of the clearest texts for the Reformed doctrines of total depravity and irresistible grace. &ldquo;Dead&rdquo; means exactly what it says: no spiritual capacity, no ability to initiate a response to God. This is not pessimism about human potential in general; it is theological realism about the human condition before God specifically. And God&rsquo;s response is not assistance to the partially alive but resurrection of the fully dead. Sovereign grace &mdash; grace that acts on those who cannot and do not cooperate &mdash; is not a harsh doctrine; it is the only coherent explanation for the &ldquo;but God&rdquo; of verse 4. If the power of verse 19&ndash;20 (the same power that raised Christ from the dead) is required to bring a sinner to life, then the initiative must be entirely divine.</p>",
    "examples": "<p><strong>Then:</strong> Paul is writing to people whose entire social world had been organised around the behaviours he is now describing as the condition of the spiritually dead. The gross paganism of Ephesus &mdash; Artemis worship, the mystery cults, the occult practices catalogued in Acts 19 &mdash; was not abstract to these new believers. &ldquo;Dead in trespasses and sins&rdquo; described lives that had been visibly wrecked and then visibly transformed. The &ldquo;but God&rdquo; pivot had a before and after that the whole congregation knew personally.</p><p><strong>Now:</strong> The therapeutic culture around the church tends to describe the human condition as wounded, broken, or struggling &mdash; all true, but insufficient. Paul&rsquo;s diagnosis is death. This matters because a therapist can treat the wounded; only a resurrection can help the dead. When the church reduces the gospel to healing and wholeness, it has made God a therapist rather than a life-giver &mdash; and the &ldquo;but God&rdquo; of verse 4 shrinks to &ldquo;but with better support.&rdquo;</p>",
    "text": "<sup>1</sup>And you were dead in the trespasses and sins <sup>2</sup>in which you once walked, following the course of this world, following the prince of the power of the air, the spirit that is now at work in the sons of disobedience &mdash; <sup>3</sup>among whom we all once lived in the passions of our flesh, carrying out the desires of the body and the mind, and were by nature children of wrath, like the rest of mankind. <sup>4</sup>But God, being rich in mercy, because of the great love with which he loved us, <sup>5</sup>even when we were dead in our trespasses, made us alive together with Christ &mdash; by grace you have been saved &mdash; <sup>6</sup>and raised us up with him and seated us with him in the heavenly places in Christ Jesus, <sup>7</sup>so that in the coming ages he might show the immeasurable riches of his grace in kindness toward us in Christ Jesus. <sup>8</sup>For by grace you have been saved through faith. And this is not your own doing; it is the gift of God, <sup>9</sup>not a result of works, so that no one may boast. <sup>10</sup>For we are his workmanship, created in Christ Jesus for good works, which God prepared beforehand, that we should walk in them."

  "5": {
    "ref": "2:11&ndash;22",
    "title": "The Dividing Wall Demolished",
    "overview": "<p>The cross does something that no political programme, no social initiative, and no act of human goodwill has ever achieved or ever could achieve: it makes enemies into one new humanity. Not enemies reconciled by compromise, not rivals brought to a managed truce, but a third entity that had never existed before &mdash; one new man, created in Christ, where the distinction that had defined the entire previous age no longer held. The Gentiles had been &ldquo;without Christ, alienated from the commonwealth of Israel, strangers to the covenants of promise, having no hope and without God in the world.&rdquo; Five descriptions of absolute exclusion. Five reasons why any inclusion was impossible by human means.</p><p>But Christ, in his own flesh, absorbed the law that divided, made peace through the blood of his cross, and created the new humanity on the other side of that blood. The wall is down &mdash; not metaphorically, not aspirationally, not as a goal to work toward, but already accomplished at Calvary. What the church is called to live out is what has already been made true. The most radical social vision in the ancient world is grounded entirely in a theological event: the death of Christ.</p>",
    "verseByVerse": [
      {
        "ref": "vv. 11&ndash;12",

        "commentary": "<p>Five descriptions of Gentile exclusion, each one darker than the last. Separated. Alienated. Strangers. No hope. Without God. The worst of the five is the last: <em>atheos</em> &mdash; without God. Not atheists in the modern sense, but people from whom God had withdrawn his covenant presence. Surrounded by gods, they were &mdash; in the most precise sense &mdash; godless.</p><p>Paul begins with &ldquo;remember&rdquo; (v.&nbsp;11). The memory of what we were is not guilt-maintenance; it is gratitude-maintenance. You cannot fully receive grace you have forgotten you needed.</p>"
      },
      {
        "ref": "v. 13",
        "quote": "&ldquo;But now in Christ Jesus you who once were far off have been brought near by the blood of Christ.&rdquo;",
        "commentary": "<p>&ldquo;But now&rdquo; &mdash; the second great pivot of chapter 2 (the first was &ldquo;but God&rdquo; in v.&nbsp;4). Far off / brought near is the language of Isaiah 57:19, which Paul will quote in v.&nbsp;17. The distance has been closed, and the means is specific: blood. Not dialogue, not mutual understanding, not the passage of time, not a shared commitment to common values &mdash; blood.</p>"
      },
      {
        "ref": "vv. 14&ndash;15",
        "quote": "&ldquo;For he himself is our peace, who has made us both one and has broken down in his flesh the dividing wall of hostility by abolishing the law of commandments expressed in ordinances.&rdquo;",
        "commentary": "<p>&ldquo;He himself is our peace&rdquo; &mdash; not the bringer of peace but peace itself. Christ does not merely arrange peace between parties; he is the substance in which peace consists. Peace is a person, and apart from him there is no other source of it.</p><p>&ldquo;The dividing wall of hostility&rdquo; almost certainly alludes to the stone barrier in the Jerusalem temple beyond which Gentiles could not pass under penalty of death &mdash; inscription fragments have been found. Christ abolished it &ldquo;in his flesh&rdquo;: the physical reality of his crucified body is what dismantled the theological barrier.</p><p>&ldquo;One new man&rdquo; (<em>hena kainon anthropon</em>) &mdash; not Gentiles absorbed into Judaism, not a cultural compromise, but a third entity that is genuinely unprecedented. The gospel does not baptise either culture; it creates a new one.</p>"

      {
        "ref": "v. 16",
        "quote": "&ldquo;And might reconcile us both to God in one body through the cross, thereby killing the hostility.&rdquo;",
        "commentary": "<p>The reconciliation is first vertical (to God) and then horizontal (Jew and Gentile). The sequence is theologically precise: you cannot have the horizontal without the vertical. Purely social gospels attempt the horizontal reconciliation without dealing with the underlying problem &mdash; alienation from God &mdash; and therefore cannot produce lasting unity. The cross solves the root issue; the human reconciliation flows from that solution.</p><p>&ldquo;Killing the hostility&rdquo; &mdash; the same cross that kills sin kills the enmity between peoples. The violence that was directed at Christ absorbs the violence that divided humanity.</p>"
      },
      {
        "ref": "vv. 17&ndash;18",
        "quote": "&ldquo;For through him we both have access in one Spirit to the Father.&rdquo;",
        "commentary": "<p>&ldquo;Access&rdquo; (<em>prosag&omacr;g&ecirc;</em>) is the word for the right of approach to a king &mdash; being formally ushered into the royal presence. Jew and Gentile now stand before the Father through the same Christ and in the same Spirit. The Trinity is the architecture of inclusion: access is through the Son, in the Spirit, to the Father.</p>"
      },
      {
        "ref": "vv. 19&ndash;22",
        "quote": "&ldquo;You are fellow citizens with the saints and members of the household of God, built on the foundation of the apostles and prophets, Christ Jesus himself being the cornerstone.&rdquo;",
        "commentary": "<p>Three images of belonging in rapid succession: citizens (political), household (familial), temple (spiritual). The progression moves inward from the outer circle of civic life to the intimacy of family to the innermost place of God&rsquo;s presence. The Gentiles who were &ldquo;strangers and aliens&rdquo; (v.&nbsp;12) are now fully inside all three.</p><p>&ldquo;The cornerstone&rdquo; (<em>akrog&omacr;niaion</em>) &mdash; the first and most important stone laid, which determines the alignment of the entire structure. Christ is not one piece of the building; he is the reference point by which every other piece is measured and positioned. The whole structure is &ldquo;joined together&rdquo; in him and &ldquo;grows into a holy temple.&rdquo; The building is not finished; it is growing.</p>"
      }

    "theology": "<p><strong>The Cross and Reconciliation.</strong> Ephesians 2:11&ndash;22 establishes that the cross achieves both vertical reconciliation (sinners to God) and horizontal reconciliation (enemies to each other), and that the horizontal is grounded in and flows from the vertical. This is the decisive theological point: you cannot engineer the second without the first. The cross does not merely provide a model of self-giving love for us to imitate; it actually creates a new humanity by dealing with the sin and hostility that divided it. Reformed theology has insisted that the church&rsquo;s social witness is not a second gospel alongside the first but the inevitable fruit of the first gospel properly received.</p>",
    "examples": "<p><strong>Then:</strong> The Jewish-Gentile hostility in the first-century church was the deepest social fracture imaginable. Jews and Gentiles did not eat together, marry each other, or share worship. The Jerusalem temple&rsquo;s dividing wall was a physical expression of a theological reality &mdash; and Paul is saying Christ demolished it. The wonder of Antioch (Acts 11:19&ndash;26), where Jew and Gentile ate at the same table for the first time, is the social expression of what Paul is describing theologically here.</p><p><strong>Now:</strong> Every generation has its dividing walls &mdash; racial, economic, class, tribal, political. The church&rsquo;s answer is never a social programme; it is the proclamation and lived demonstration that Christ has already torn down the wall. Churches that are ethnically or socially homogeneous by preference are not just a missed opportunity &mdash; they are a partial contradiction of what Paul says happened at Calvary.</p>",
    "text": "<sup>11</sup>Therefore remember that at one time you Gentiles in the flesh, called &ldquo;the uncircumcision&rdquo; by what is called the circumcision, which is made in the flesh by hands &mdash; <sup>12</sup>remember that you were at that time separated from Christ, alienated from the commonwealth of Israel and strangers to the covenants of promise, having no hope and without God in the world. <sup>13</sup>But now in Christ Jesus you who once were far off have been brought near by the blood of Christ. <sup>14</sup>For he himself is our peace, who has made us both one and has broken down in his flesh the dividing wall of hostility <sup>15</sup>by abolishing the law of commandments expressed in ordinances, that he might create in himself one new man in place of the two, so making peace, <sup>16</sup>and might reconcile us both to God in one body through the cross, thereby killing the hostility. <sup>17</sup>And he came and preached peace to you who were far off and peace to those who were near. <sup>18</sup>For through him we both have access in one Spirit to the Father. <sup>19</sup>So then you are no longer strangers and aliens, but you are fellow citizens with the saints and members of the household of God, <sup>20</sup>built on the foundation of the apostles and prophets, Christ Jesus himself being the cornerstone, <sup>21</sup>in whom the whole structure, being joined together, grows into a holy temple in the Lord. <sup>22</sup>In him you also are being built together into a dwelling place for God by the Spirit."
  },
  "6": {
    "ref": "3:1&ndash;13",
    "title": "The Mystery Revealed",
    "overview": "<p>Paul begins a prayer in verse 1 &mdash; &ldquo;For this reason I, Paul, a prisoner&hellip;&rdquo; &mdash; and then stops. He will not complete it until 3:14. What interrupts him is not distraction but revelation: the thought of what God has entrusted to him breaks open into a meditation he cannot compress, and he cannot pray until he has said it. The mystery &mdash; a previously hidden plan now disclosed by the Spirit to the apostles and prophets &mdash; is this: that the Gentiles are fellow heirs, members of the same body, partakers of the same promise in Christ Jesus. Not second-class beneficiaries. Not tolerated guests at Israel&rsquo;s table. Co-inheritors, same body, same promise.</p><p>And then Paul says something that still astonishes: the vehicle for making this mystery known to the cosmic powers and authorities in the heavenly places is &mdash; the church. The multi-ethnic, Jew-and-Gentile body of Christ is the advertisement in the heavenlies of the manifold wisdom of God. The angels are watching the church. Not because the church is impressive, but because what is visible in the church &mdash; the impossible unity, the Gentiles and Jews at one table &mdash; is the clearest display in the cosmos of what God&rsquo;s wisdom looks like when it is fully deployed.</p>",
    "verseByVerse": [

        "commentary": "<p>&ldquo;A prisoner of Christ Jesus&rdquo; &mdash; not of Rome, though that is also true. Paul understands his imprisonment as Christ&rsquo;s, not Caesar&rsquo;s. The chains serve the mission rather than obstruct it; this letter is the proof.</p><p>&ldquo;Stewardship&rdquo; (<em>oikonomia</em>) &mdash; household management, the administration of an estate. Paul is a steward of grace, not its owner. The mystery came to him by direct revelation &mdash; not derived from tradition or rabbinical study but disclosed supernaturally. This grounds the authority of what he is about to say.</p>"

        "quote": "&ldquo;The mystery of Christ, which was not made known to the sons of men in other generations as it has now been revealed to his holy apostles and prophets by the Spirit.&rdquo;",
        "commentary": "<p>&ldquo;Not made known&hellip; <em>as</em> it has now been revealed&rdquo; &mdash; the mystery was not absent from the Old Testament but it was hidden there, not yet visible. The apostles and prophets together form the revelatory foundation of the church (2:20). Their office was unrepeatable: once the revelation was complete and inscripturated, the foundation was laid and does not need to be relaid. This is why claims to new apostolic revelation are theologically incoherent in Paul&rsquo;s own terms.</p>"
      },
      {

        "quote": "&ldquo;This mystery is that the Gentiles are fellow heirs, members of the same body, and partakers of the same promise in Christ Jesus through the gospel.&rdquo;",
        "commentary": "<p>Three &ldquo;fellow-&rdquo; compounds in Greek (<em>sug-kl&ecirc;ronomos, sus-s&omacr;ma, sum-metocha</em>), each insisting on equal standing. Fellow heirs &mdash; same inheritance. Same body &mdash; not a parallel body, the same one. Same promise &mdash; not derivative promises, the original covenant promise. The equality is absolute, and it comes &ldquo;through the gospel&rdquo; &mdash; the proclaimed word is the instrument of inclusion, not circumcision or Torah-keeping.</p>"
      },
      {
        "ref": "vv. 7&ndash;8",

        "commentary": "<p>&ldquo;The very least of all the saints&rdquo; &mdash; in Greek Paul coins a new comparative form of &ldquo;least&rdquo; (<em>elachistoteros</em>) to go below what Greek grammar allows. He is not performing false modesty; he is referencing the fact that he persecuted the church (1&nbsp;Cor. 15:9). The grace that reached him is the most dramatic exhibit in the letter of what he is describing.</p><p>&ldquo;Unsearchable&rdquo; (<em>anexichniastos</em>) &mdash; literally untraceable, incapable of being tracked to its source. The riches of Christ exceed every map. No theology can exhaust them; no lifetime of preaching can deplete them.</p>"
      },
      {
        "ref": "vv. 9&ndash;10",
        "quote": "&ldquo;So that through the church the manifold wisdom of God might now be made known to the rulers and authorities in the heavenly places.&rdquo;",
        "commentary": "<p>The church is not merely the beneficiary of the mystery; it is the medium of its announcement to the cosmos. &ldquo;Manifold&rdquo; (<em>polupoikilos</em>) &mdash; many-coloured, richly varied, like an intricate mosaic. The wisdom of God is displayed in its full complexity through the multi-ethnic, multi-cultural unity of the church.</p><p>The rulers and authorities in the heavenly places are watching the church. They are watching not because the church is impressive but because the thing visible in it &mdash; the impossible unity of former enemies at one table &mdash; is the clearest display in the cosmos of what God&rsquo;s wisdom looks like deployed at full scale.</p>"
